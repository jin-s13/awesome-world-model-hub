  title_cn: 三合一世界模型：基于能量的—致性、预测与反事实推断在营销干预中的应用
  abstract_cn: 营销决策反映了潜在消费者异质性、时变内部状态和显式干预之间的相互作用，当前以预测和语言为导向的模型未能以统一的方式捕捉这一结构。我们提出了一种三合一世界模型架构，其中深度玻尔兹曼机（DBM）从人口统计信息、时间和滞后动作与结果中学习冻结的信念表示，并在其上附加轻量级任务特定适配器。同一信念在单一框架内支持三项任务：（i）通过DBM的自由能进行基于能量的一致性评估，（ii）通过适配器进行结果预测，以及（iii）通过固定信念仅改变输入给适配器的动作进行反事实推断。使用一个受控模拟（其中每个消费者的潜在价格敏感性、促销响应性和基础偏好已知），我们展示了适配器在访问和购买AUC上与强MLP基线匹配，同时在恢复异质性处理效应方面显著优于基于相同原始特征构建的S-、T-、X-和DR-学习器元学习器以及因果森林基线，在混杂的价格促销干预上差距最大。此外，自由能钳制系统性地惩罚缺乏先前促销曝光的反事实购买轨迹，且惩罚本身依赖于潜在基础偏好，方向符合预期。这些结果表明，DBM信念以在反事实查询中保持有效的方式解缠潜在特征，为营销干预提供了集成的世界模型基础。
