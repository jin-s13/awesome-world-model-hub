  title_cn: Voyager：一个基于大型语言模型的开放式具身智能体
  abstract_cn: 我们介绍了Voyager，这是首个在Minecraft中由LLM驱动的具身终身学习智能体，它无需人工干预即可持续探索世界、获取多样技能并做出新颖发现。Voyager包含三个关键组件：1）最大化探索的自动课程；2）用于存储和检索复杂行为的不断增长的技能库（可执行代码）；3）一种新的迭代提示机制，结合环境反馈、执行错误和自我验证来改进程序。Voyager通过黑盒查询与GPT-4交互，无需微调模型参数。Voyager开发的技能具有时间延展性、可解释性和组合性，这快速增强了智能体的能力并缓解了灾难性遗忘。实验表明，Voyager展现出强大的上下文终身学习能力，并在玩Minecraft方面表现出卓越的熟练度。它获得的独特物品数量是先前最先进方法的3.3倍，旅行距离是其2.3倍，解锁关键技术树里程碑的速度最高提升15.3倍。Voyager能够在一个新的Minecraft世界中利用已学习的技能库从头解决新任务，而其他技术难以泛化。我们在https://voyager.minedojo.org/开源了完整的代码库和提示。
