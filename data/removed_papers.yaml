- id: transformers-linearly-represent-highly-structured-world-mode-2026
  title: Transformers Linearly Represent Highly Structured World Models
  authors:
  - Roman Kniazev
  - Nathanaël Fijalkow
  abstract: 'Do transformers, when trained on sequential reasoning traces, build internal
    models of the underlying task? And if so, does the structure of those internal
    representations mirror the structure of the domain? We train an 8-layer transformer
    on Sudoku solving traces and perform a mechanistic analysis of its internal computation.
    We establish two results. First, the model builds a substructure world model:
    it does not represent the board state cell by cell, as a human analyst would expect,
    but organizes information around the rows, columns, and boxes that Sudoku''s constraints
    act on. Second, we identify a naked-single circuit: a small set of dedicated neurons
    in the final MLP layer, each individually detecting when exactly one digit remains
    possible for a specific cell, and reliably promoting that digit. These findings
    show that the geometry of an emergent world model is shaped by the constraint
    algebra of the domain, not its surface presentation, and that the resulting decision
    circuit is sparse, monosemantic, and fully interpretable. More broadly, they demonstrate
    that mechanistic interpretability tools can recover an end-to-end algorithmic
    account of how a transformer solves a combinatorial reasoning task.'
