  abstract_cn: 社交智能是语言智能体的核心能力，然而当前研究主要关注静态能力评估，而非这些技能如何被持续塑造和积累。这一差距要求转向可持续学习范式。目前存在两个方法论痛点：社交交互轨迹缺乏统一的结构化表示以形成可迭代的学习信号，且能力提升与保持通常被孤立研究，阻碍了持续演进的评估。为弥合这一差距，我们提出了社交世界模型。我们将社交交互分解为五个维度（场景设置、观察、心理状态、行动和对话），构建闭环学习框架。在该框架中，智能体收集交互经验，将其转化为偏好信号用于模型更新，并重新部署更新后的策略以继续学习。此外，我们提供了可复用的数据合成机制和终身学习基准，将社交能力从“评估对象”转变为“可持续训练对象”。在ASCENT-Bench上验证我们的框架，经过交互训练的Qwen2.5-7B模型在所有五个核心指标上均优于其基线。值得注意的是，它在完成率上与闭源Gemini
    3 Flash持平，在通过率上超过它，并在三个难度级别上实现了零遗忘。与以往仅报告静态比较或能力衰减的工作不同，这种端到端方法提供了一条可训练、可验证、可保留的路径，表明小型开源模型能够可持续地获得具有竞争力的社交协调能力。
