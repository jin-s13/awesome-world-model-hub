  title_cn: 思维即规划：基于强化规划的潜在世界模型用于思维链优化
  abstract_cn: 大语言模型（LLMs）在各种自然语言处理任务中的成功，提升了推理链优化作为将模型行为与任务目标对齐的关键步骤的重要性。现有的推理链调优方法通常依赖黑盒启发式或免梯度搜索，缺乏可解释性、泛化性和样本效率。在这项工作中，我们引入了Thoughts-as-Planning，一个新颖的框架，将推理链优化形式化为潜在语义空间上的序列决策过程。我们将大语言模型建模为部分可观测环境，并学习一个潜在世界模型来模拟推理链编辑对下游输出的影响。构建了一个保持邻近性的嵌入空间来编码推理链-响应动态，使得通过梯度下降或强化学习进行规划成为可能。我们的方法支持多尺度抽象，允许在词元、片段和指令级别进行推理链编辑，并整合到一个统一的规划器中。通过在语言理解和生成任务上的大量实验，我们证明了Thoughts-as-Planning在效率、鲁棒性和泛化性方面优于最先进的推理链调优基线，同时通过其结构化的规划轨迹提供可解释性。我们的代码可在https://github.com/FastLM/Thoughts-as-Planning获取。
