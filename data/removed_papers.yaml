    method_summary: We model temporally evolving affect as explicit belief-state updates
      rather than static classification. Although standard MLLMs provide strong multimodal
      representations, their hidden states are optimized for immediate responses and
      do not capture affect dynamics under partial observations. AffectVerse addresses
      this with an Emotion World Module (EWM). As shown in Figure 2, EWM comprises
      Cross-Modal Temporal Imagination, MAMA Belief Aggregation, and Belief Injection.
  title_cn: AffectVerse：面向多模态情感计算的情感世界模型
  abstract_cn: 人类通过整合观察到的多模态线索以及对情感状态可能如何展开的预期来推断情感。然而，现有的多模态大语言模型（MLLMs）通常将情感识别视为对完整视听文本输入的静态融合，忽略了情感动态。我们提出AffectVerse，一种基于Qwen2.5-Omni的模型，配备情感世界模块（EWM），这是一个无动作的表示级模块，用于短时域潜在情感预测。EWM包含三个子模块：1）跨模态时间想象，通过多步展开从过去令牌预测未来视频/音频表示；2）MAMA（模态感知多步注意力）信念聚合，将想象令牌压缩为模态感知的信念令牌；3）信念注入，将这些信念令牌插入LLM进行情感推理。AffectVerse将未来预测作为过去条件的自监督信号：它不替代对观察历史的建模，也不需要在推理时使用未见信号，而是迫使当前信念状态编码能够预测后续情感变化的过渡线索。在九个基准上，AffectVerse相比其他模型至少提升2.57%，而控制消融实验显示时间想象、跨模态展开和信念聚合具有累加增益。这些结果表明，预测性信念状态建模是情感计算的一种实用替代方案。
