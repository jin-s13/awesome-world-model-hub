  abstract_cn: 由于大型语言模型（LLMs）在预测文本方面取得了显著成功，它们似乎必须能够访问一个表示因果和定义结构的“世界模型”。然而，现代因果推断的主流形式——Judea
    Pearl的干预主义方法和Neyman-Rubin潜在结果框架——难以阐明LLMs如何学习因果结构。我通过论证LLMs采用一种基于差异制造逻辑（有时称为变分归纳）的特定归纳方法来解决这一难题。我展示了该逻辑的核心方面如何在训练过程中实现，其中LLMs需要来自广泛上下文的海量文本数据，以识别词序列中的差异制造者和无差异制造者。此外，我分析了LLMs的特定架构特征（如词嵌入和自注意力）在变分归纳中的作用。LLMs的差异制造逻辑与实验方法基本平行，即通过系统性地改变个别情况以确定其对现象的影响来推导因果关系。
