  title_cn: 为什么相同观察会导致结论分歧：通过推理形式化世界模型不可识别性
  abstract_cn: 当人们共享相同的文档和观察却得出不同结论时，分歧往往转化为对另一方认知缺陷、非理性或恶意行为的判断。本文认为，这种分歧更应被描述为推理和学习中固有的不可识别性的一种形式，而非另一方的缺陷。我们将该现象组织为两个层级：(i)
    θ层级不可识别性，即在相同世界模型W下，由于推理设置不同而导致结论分歧；(ii) W层级不可识别性，即重复使用某一推理设置θ会偏置数据暴露和更新规则，导致习得的世界模型W本身发生分歧。我们引入推理轮廓θ
    = (R, E, S, D)，分别代表参考(Reference)、探索(Exploration)、稳定化(Stabilization)和视界(Horizon)，并展示即使对于相同的观察o和相同的W，输出也可能分裂。我们进一步解释了为何分歧倾向于投影到少数几个基上——抽象与具体、可外部化、秩序与自由——这是学习系统一般约束（计算约束、观察约束和协调约束）的结果。最后，我们将该框架与深度表示学习联系起来，包括表示层次、潜在状态估计以及正则化-探索权衡，并通过一个关于AI监管辩论的案例研究来说明该框架。
