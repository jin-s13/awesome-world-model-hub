  title_cn: Chreode：一种用于一步时间动态和扰动预测的细胞世界模型
  abstract_cn: 预测细胞在发育信号或遗传扰动下如何改变其转录状态，是计算机模拟生物学和AI Virtual Cell program的计算核心。现有方法要么拟合忽略时间的静态对照到处理映射，要么在每个数据集上独立求解多步常微分方程/薛定谔桥问题。我们提出了Chreode，一种通过结构化残差转移算子预测动作条件化细胞状态转变的一步细胞世界模型。它将分布演化从推理时间转移到训练时间，实现单次生成，同时保留了受Waddington启发的分解：下坡景观流、切向旋转动力学和随机扩散。该模型使用共享的scVI编码器和基于DiT的动态骨干网络，在涵盖7个数据集的240万细胞小鼠胚胎图谱上进行预训练。作为微调初始化，Chreode在Weinreb造血和Veres胰岛分化数据集上，相比匹配的从头模型、PI-SDE和PRESCIENT，改善了每个目标的Sinkhorn距离。作为GEARS的可迁移基因状态嵌入，预训练的动态表示将Norman
    Perturb-seq上的共享词汇DE20均方误差从0.2121降低到0.1858，相对提升12.4%，且未改变GEARS的训练流程。我们将这种向扰动预测的迁移解释为证据，表明预训练的发育轨迹动态编码了可迁移到CRISPR诱导状态转变的分化基元，因为两者都涉及共享潜在几何结构中的细胞状态转变。预训练的骨干网络还在Weinreb数据集上产生了与强动态最优传输基线相竞争的零样本克隆命运分数。
