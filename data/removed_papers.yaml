  title_cn: ARIS：面向社交机器人的代理与关系智能系统
  abstract_cn: 基础模型推动了社交机器人的发展，使其能够实现更丰富的感知和与用户的交互式沟通。然而，当前系统在多轮对话、社交关系推理以及大规模上下文相关对话方面仍存在困难。我们提出了ARIS（代理与关系智能系统），这是一个代理型AI框架，将多模态推理、基于图的社会世界模型（Social
    World Model）以及检索增强生成（RAG）统一在一个用于社交机器人的模块化架构中。我们使用Pepper机器人在机器人介导的双人对话场景中对ARIS进行了评估，并将其与一个大语言模型基线进行了比较。一项用户研究（N=23）表明，ARIS在感知智能、活力、拟人化和喜爱度方面均显著更高。我们的贡献有三方面：（1）社会世界模型，通过知识图谱显式地映射和更新用户之间的社交关系，实现跨相遇的社交推理和重新识别；（2）高效的基于RAG的对话流水线，在对话历史增长至数千轮时仍能保持有界延迟并维持回复相关性；（3）系统集成与实证验证，将这些组件整合在一个模块化代理架构中，通过结构化API协调语音、视觉和物理动作。ARIS的实现将在发表后以开源形式发布。
