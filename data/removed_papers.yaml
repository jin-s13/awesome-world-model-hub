    是一种基于模型的强化学习安全强制技术。然而，由于 shield 是通过严格的形式化方法自动合成的，其决策往往同样难以被人类解释。近年来，decision trees
    已成为表示控制器和策略的常用方法。但由于 shield 本质上具有非确定性，其 decision tree 表示在实践中变得过于庞大而无法解释。为解决这一挑战，我们提出了一种新颖的可解释安全强化学习方法，通过提供对
    shield 决策的人类可理解解释来增强信任。我们的方法将屏蔽策略表示为 decision trees 的层次结构，提供自上而下、基于案例的解释。在设计时，我们使用
    world model 分析在给定状态下执行动作的安全风险。基于此分析，我们构建了 shield 和一个高层 decision tree，将状态分类为风险类别（安全、临界、危险、不安全），解释为何某种情况可能是安全关键的。在运行时，我们生成局部
