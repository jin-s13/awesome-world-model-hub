- id: explainably-safe-reinforcement-learning-2026
  title: Explainably Safe Reinforcement Learning
  authors:
  - Sabine Rieder
  - Stefan Pranger
  - Debraj Chakraborty
  - Jan Křetínský
  - Bettina Könighofer
  abstract: Trust in a decision-making system requires both safety guarantees and
    the ability to interpret and understand its behavior. This is particularly important
    for learned systems, whose decision-making processes are often highly opaque.
    Shielding is a prominent model-based technique for enforcing safety in reinforcement
    learning. However, because shields are automatically synthesized using rigorous
    formal methods, their decisions are often similarly difficult for humans to interpret.
    Recently, decision trees became customary to represent controllers and policies.
    However, since shields are inherently non-deterministic, their decision tree representations
    become too large to be explainable in practice. To address this challenge, we
    propose a novel approach for explainable safe RL that enhances trust by providing
    human-interpretable explanations of the shield's decisions. Our method represents
    the shielding policy as a hierarchy of decision trees, offering top-down, case-based
    explanations. At design time, we use a world model to analyze the safety risks
    of executing actions in given states. Based on this analysis, we construct both
    the shield and a high-level decision tree that classifies states into risk categories
    (safe, critical, dangerous, unsafe), explaining why a situation may be safety-critical.
    At runtime, we generate localized decision trees that explain which actions are
    allowed and why others are deemed unsafe. Our method facilitates explainability
    of the safety aspect in safe-by-shielding reinforcement learning, requires no
    additional information beyond what is already used for shielding, incurs minimal
    overhead, and integrates readily into existing shielded RL pipelines. In our experiments,
    we compute explanations using decision trees that are several orders of magnitude
    smaller than the original shield.
