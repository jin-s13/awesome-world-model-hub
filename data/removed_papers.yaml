  title_cn: 主动推理：一种对AI系统能动性进行表型分析的方法？
  abstract_cn: 能动人工智能的激增已超越了表征计算系统中能动性所需的概念工具。当前的定义主要依赖于自主性和目标导向性。在此，我们主张一种基于三个标准可进行原则性检验的最小化概念：意向性——行动根植于信念和欲望；理性——行动由世界模型蕴含的规范性一致；可解释性——行动在因果上可追溯至内部状态；随后，我们将这些标准实例化为一个变分框架下的部分可观测马尔可夫决策过程，其中后验信念、先验偏好以及期望自由能的最小化共同构成能动性行动链。通过经典的T-maze范式（T-maze
    paradigm），我们证明了赋权（empowerment）——定义为行动与预期观测之间的信道容量——如何作为一种操作度量，通过对生成模型的结构性操作来区分零、中、高能动性表型。最后，我们论证，当智能体通过认知觅食（epistemic
    foraging）来消除歧义时，仍然有效的治理控制必须从外部约束系统地转向对先验偏好的内部调节，从而为从计算表型分析到人工智能治理策略提供一条原则性的变分桥梁。
