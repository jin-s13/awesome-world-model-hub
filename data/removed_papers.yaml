  abstract_cn: 当Transformer在序列推理轨迹上训练时，它们是否会构建底层任务的内部模型？如果是，这些内部表征的结构是否反映了领域结构？我们训练了一个8层Transformer在数独求解轨迹上，并对其内部计算进行了机制分析。我们建立了两个结果。第一，模型构建了一个子结构世界模型：它不像人类分析师预期的那样逐格表示棋盘状态，而是围绕数独约束所作用的行、列和宫来组织信息。第二，我们识别出一个裸单数电路：最终MLP层中一小群专用神经元，每个单独检测何时某个特定单元格只剩下一个可能的数字，并可靠地促进该数字。这些发现表明，涌现的世界模型的几何形状由领域的约束代数塑造，而非其表面呈现，并且由此产生的决策电路是稀疏的、单语义的且完全可解释。更广泛地说，它们证明了机制可解释性工具能够恢复Transformer如何解决组合推理任务的端到端算法解释。
