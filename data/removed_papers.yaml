  abstract_cn: 现代视频生成模型能产生视觉上令人印象深刻的结果，但经常违反基本的物理原理。我们提出Proprio，一种无需训练的框架，使冻结的视频生成器能够评估并改进其自身输出的物理合理性。受本体感觉（即对自身运动的生物感知）启发，Proprio将模型在受控潜在扰动下的流残差视为自评分信号。那些能被生成器学习到的动力学更好地解释的样本，会产生更小且更稳定的残差。我们跨时间步和扰动聚合该信号，通过动态时空掩码将其聚焦于运动相关区域，并将其用于最佳N选搜索、基于梯度的自优化，或两者结合。在文本到视频和图像到视频的基准测试中，Proprio持续提升物理合理性，在多个设置中优于基于VLM的评分和外部世界模型基线。使用TurboWan2.2，Proprio将Physics-IQ从32.2提升至37.5（+16.5%），将VideoPhy2-hard物理常识从45.6提升至55.0（+20.6%）。人工评估进一步表明，在大约三分之二的比较中，评估者更偏好Proprio选择或优化的视频的物理合理性。这些结果表明，冻结的视频生成器包含可操作的内部信号，用于评估和改进其自身输出的物理合理性。
