  abstract_cn: 真正的通用智能不仅需要物理世界模型，还需要社会世界模型：即推断个体心理状态如何相互作用并结晶为群体层面结果的能力。尽管在个体层面的心智理论（ToM）推理方面取得了显著进展，现有的多模态大语言模型在这一更广泛的任务上仍然失败。集体行为从社会张力、从众动态和结构约束中非线性地涌现，这意味着它不能通过简单加总个体意图来恢复。我们提出了GroupToM-Bench，这是首个针对群体层面ToM的多模态基准，围绕一个因果链构建，涵盖微观层面的BDI状态（信念、欲望、意图）、中观层面的群体张力和结构约束，以及宏观层面的结果预测和机制归因。为了探究这一完整弧线，我们开发了一个七级认知审计框架。实验揭示了当前模型与人类基线之间的差距，突显了在处理社会结构和非线性集体动态方面的失败。
