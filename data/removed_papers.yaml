- id: quantum-cinema-an-interactive-cinematic-exploration-of-quan-2026
  title: 'Quantum Cinema: An Interactive Cinematic Exploration of Quantum Computing
    Hardware via Generative World Models'
  authors:
  - Aoyu Zhang
  - Dongping Liu
  - Luyao Zhang
  abstract: 'Quantum computing promises transformative advances across science and
    industry, yet the physical hardware that enables these computations remains invisible
    to the public: quantum processors operate inside sealed dilution refrigerators
    at temperatures near absolute zero, making direct observation impossible. This
    "imagination gap" between quantum computing''s growing societal impact and the
    public''s ability to visualize it represents a significant barrier to quantum
    literacy and workforce development. We present Quantum Cinema, an open-source,
    browser-based interactive application that closes this gap by transforming invisible
    quantum hardware into explorable, cinematic experiences using generative world
    models. Quantum Cinema guides users through a four-act narrative -- from the foundational
    Nobel Prize-winning science of quantum entanglement, through curated video introductions
    to three major quantum computing architectures (trapped-ion, neutral-atom, and
    superconducting systems), into immersive three-dimensional generative worlds that
    make invisible quantum phenomena observable, and finally to interactive radar-chart
    comparisons grounded in real quantum device specifications. All three-dimensional
    environments are generated using WorldLabs'' generative world model platform and
    are scientifically grounded in curated metrics from Amazon Web Services (AWS)
    Braket quantum hardware. Quantum Cinema requires no installation, no specialized
    hardware, and no quantum computing background. It is designed to serve two distinct
    communities: scholars and developers seeking to replicate or extend the platform,
    and educators, researchers, and science communicators seeking an intuitive tool
    for explaining quantum hardware to diverse audiences. This paper describes the
    system architecture, the generative world model pipeline, use cases for both communities,
    and directions for future work.'
