- id: three-in-one-world-model-energy-based-consistency-predicti-2026
  title: 'Three-in-One World Model: Energy-Based Consistency, Prediction, and Counterfactual
    Inference for Marketing Intervention'
  authors:
  - Junichiro Niimi
  abstract: 'Marketing decisions reflect the interaction of latent consumer heterogeneity,
    time-varying internal states, and explicit interventions, a structure that current
    prediction- and language-oriented models do not capture in a unified manner. We
    propose a Three-in-One world-model architecture in which a Deep Boltzmann Machine
    (DBM) learns a frozen belief representation from demographics, time, and lagged
    actions and outcomes, with lightweight task-specific adapters attached on top.
    The same belief supports three tasks within a single framework: (i) energy-based
    consistency evaluation through the DBM''s free energy, (ii) outcome prediction
    through adapters, and (iii) counterfactual inference by holding the belief fixed
    and varying only the action input given to the adapter. Using a controlled simulation
    in which the latent price sensitivity, promotion responsiveness, and base preference
    of each consumer are known, we show that the adapters match a strong MLP baseline
    on visit- and purchase-AUC while recovering heterogeneous treatment effects substantially
    better than S-, T-, X-, and DR-learner meta-learners and a Causal Forest baseline
    built on the same raw features, with the largest gap on a confounded price-promotion
    intervention. Complementing this, free-energy clamps systematically penalize counterfactual
    purchase trajectories that lack prior promotional exposure, and the penalty itself
    depends on the latent base preference in the expected direction. These results
    indicate that DBM beliefs disentangle latent traits in a form that survives counterfactual
    queries, providing an integrated world-model substrate for marketing intervention.'
