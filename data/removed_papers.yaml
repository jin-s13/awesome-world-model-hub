  title_cn: 从像素到概念：利用基础模型构建丰富的3D语义场景图森林
  abstract_cn: 在复杂的现实环境中操作要求机器人能够在功能性语义层面上理解其周围环境。这需要一个详细的多层世界模型来捕捉其周围环境的复杂关系。层次化3D场景图通过将几何、语义和关系数据整合在一个统一的空间框架中来解决这一挑战。然而，当前的3D场景图方法通常局限于预定义关系类别的刚性结构，大多忽略了重要的语义连接，如因果连接或环境上下文。本文探索了利用基础模型构建具有开放语义关系的3D场景图森林的潜力，以提升场景理解和机器人任务执行。我们提出了一种方法，其中实例特定的概念节点和关系首先由VLM识别，然后由LLM扩展，通过推理推断出更广泛、更抽象的概念节点和关系。这些对象节点、概念节点和关系随后被组装成一个层次化的3D场景图森林，并通过概念节点增强以表示抽象概念。在uHumans2和ScanNet室内数据集上进行了评估，验证了生成关系的准确性和相关性。场景图森林在机器人应用中的下游适用性通过一个开放词汇对象检索任务得到证明，该任务利用了ScanNet数据和波士顿动力Spot在真实室内环境中的部署。本文利用基础模型创建更具表现力、语义更深的3D层次化场景图，并展示了它们在提升机器人语义和环境理解方面的潜力。
