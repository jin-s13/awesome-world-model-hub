  title_cn: 情感音乐推荐：基于展开的世界模型用于离线偏好优化
  abstract_cn: 功能性音乐应用，从消费者专注和睡眠辅助到临床干预，共享一个独特的推荐问题：成功由听者的情感状态定义，但针对情感进行在线实验受到伦理约束，尤其是对于无法可靠跳过歌曲或报告痛苦的临床人群。我们描述了AMRS，即部署在LUCID健康与
    wellness 平台上的情感音乐推荐系统，该平台服务于临床用户（主要是患有神经认知状况的老年人）和消费者健康用户，涵盖活力、专注、平静和睡眠模式。AMRS围绕一个基于展开的世界模型构建：一个在记录的收听数据上训练的因果Transformer，用于联合预测参与度、二元评分以及自我报告的效价和唤醒度。该世界模型既作为离线策略训练的计算机模拟器，也作为部署前的压力测试工具。通过行为克隆初始化的推荐策略，使用直接偏好优化（DPO）针对可配置的多目标效用函数进行离线微调。在严格的冷启动协议下，世界模型以可用的保真度预测行为和情感信号；DPO在保持相似多样性分布并避免贪婪优化产生的分布崩溃的同时，提高了预测的效价和唤醒度，优于克隆基线。我们将这项工作定位为一种在在线实验伦理上不可行时进行情感推荐的方法论的早期部署验证。
