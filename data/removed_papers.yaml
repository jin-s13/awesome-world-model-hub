  title_cn: 因果奖励世界模型：面向自动化技能生成的零样本奖励设计
  abstract_cn: 自动化奖励设计（ARD）旨在通过语言驱动的奖励函数合成来替代强化学习中的手动奖励工程。然而，现有基于大语言模型（LLM）的方法本质上仍是相关性驱动的，依赖迭代环境反馈来为每个特定任务优化奖励假设。这种范式不仅导致推理效率低下，还使LLM容易受到语义上合理但因果虚假的奖励组件的影响，从而导致优化无效。为解决这些局限性，我们提出了因果奖励世界模型（CRWM），该模型通过在多任务交互数据上进行离线预训练，显式建模候选奖励组件与任务目标物理变量之间的因果拓扑关系。基于由粗到细的预训练策略，我们引入了一个联合优化模块，该模块集成了显式机制解耦与置信度感知软融合，利用微观轨迹细化粗粒度结构先验，从而构建鲁棒且可解释的因果骨架。在推理时，LLM将CRWM作为任务无关的因果先验来约束奖励生成，实现零样本奖励函数设计。我们的工作为ARD问题开辟了一种新的白盒范式。在复杂连续控制基准上的大量实验表明，CRWM无需反馈驱动的奖励优化即可生成可执行的奖励函数，显著降低了获取新机器人技能的设计延迟，同时匹配或超越了最先进的性能，并在未见任务和多样化机器人形态上展现出强大的泛化能力。
