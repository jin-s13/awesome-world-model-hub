- id: social-world-model-for-lifelong-social-intelligence-2026
  title: Social World Model for Lifelong Social Intelligence
  authors:
  - Yu Luo
  abstract: 'Social intelligence is a core competency for language agents, yet current
    research primarily focuses on static capability evaluation rather than how these
    skills are continuously shaped and accumulated. This gap calls for a shift toward
    sustainable learning paradigms. Currently, two methodological pain points exist:
    social interaction trajectories lack unified structured representations to form
    iterable learning signals, and capability improvement and retention are typically
    studied in isolation, hindering the assessment of continuous evolution. To bridge
    this gap, we propose the Social World Model. We decompose social interaction into
    five dimensions (scene setting, observation, mental state, action, and dialogue)
    to build a closed-loop learning framework. In this setup, agents collect interaction
    experiences, convert them into preference signals for model updating, and redeploy
    the updated policy for continued learning. Additionally, we provide a reusable
    data synthesis mechanism and a lifelong learning benchmark, transforming social
    capabilities from an "object of evaluation" into an "object of sustainable training".
    Validating our framework on the ASCENT-Bench, the interactively trained Qwen2.5-7B
    model outperforms its baseline across all five core metrics. Notably, it matches
    the closed-source Gemini 3 Flash in completion rate, exceeds it in pass rate,
    and achieves zero forgetting across three difficulty levels. Unlike prior works
    that merely report static comparisons or capability decay, this end-to-end approach
    provides a trainable, verifiable, and retainable pathway, demonstrating that small
    open-source models can sustainably acquire competitive social coordination capabilities.'
