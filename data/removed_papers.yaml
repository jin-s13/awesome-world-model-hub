  title_cn: 面向欧拉-拉格朗日机器人动力学的物理感知稀疏学习与选择性在线自适应
  abstract_cn: 精确的动力学模型对于基于模型的机器人控制至关重要，然而名义上的欧拉-拉格朗日模型在存在负载变化、未建模耦合、摩擦、空气动力学效应以及变化运行条件时往往变得不准确。大多数基于学习的校正方法通过引入单个加性残差来提高预测精度，但未能保留欧拉-拉格朗日系统的内部机械结构。这导致模型无法保持对称性、正定性或惯性项与速度相关项之间的耦合，从而可能产生物理上不一致的预测，并在嵌入基于模型的控制器时降低可靠性。我们提出了一种结构保持的残差学习框架，将模型失配分解为惯性校正、相应的诱导科里奥利项以及广义力残差。机械部分在物理约束下学习，而扰动敏感部分则通过稀疏的历史依赖潜在交互模型表示，并利用贝叶斯线性回归进行在线自适应。这种分离保留了关键的机械结构，同时将自适应限制在受变化条件影响最大的动力学部分。在多个机器人平台（包括移动机器人、空中机器人和机械臂系统）上的实验表明，所提方法在耦合和时变动力学条件下改善了动力学预测和轨迹跟踪。这些结果凸显了将结构化残差建模、紧凑潜在交互选择以及选择性在线自适应相结合对于实际基于模型控制的价值。
