  related_work_outline:
  - 'Mainstream direction: Benchmarking world models for spatial consistency, memory,
    action control, and domain-specific fidelity (driving, embodied, multiplayer).'
  - 'Shared research pattern: Curated datasets with multi-dimensional metrics (visual,
    geometric, physical, behavioral) and open-source evaluation frameworks.'
  - 'Key differences: Domain focus (driving vs. Minecraft vs. general embodied) and
    evaluation axes (spatial vs. memory vs. action vs. human preference).'
  - 'Trend evolution: From single-domain pixel-level benchmarks (2024) to multi-faceted,
    multi-agent, and human-aligned evaluations (2025–2026).'
  - 'Open questions: Whether proxy metrics align with downstream decision utility;
    how to ensure benchmark conclusions generalize across implementations and compute
    budgets.'
  related_work_outline_zh:
  - 主流方向：对世界模型的空间一致性、记忆、动作控制和领域特定保真度（驾驶、具身、多人）进行基准测试。
  - 研究共性：使用精心策划的数据集和多维指标（视觉、几何、物理、行为）以及开源评估框架。
  - 关键差异：领域焦点（驾驶 vs. Minecraft vs. 通用具身）和评估轴（空间 vs. 记忆 vs. 动作 vs. 人类偏好）。
  - 趋势演进：从2024年的单领域像素级基准，发展到2025–2026年的多维度、多智能体和人类对齐评估。
  - 开放问题：代理指标是否与下游决策效用一致；基准结论如何在不同实现和算力预算下保持稳定。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Creating shared tasks and datasets that make world-model claims
        comparable across methods and domains.
      what_remains_open: Whether the task distribution covers the settings where world
        models are expected to help (e.g., long-horizon, multi-agent).
    - line: Metric and stress-test design
      what_it_solves: Probing prediction, controllability, robustness, and decision
        utility beyond aggregate scores like FVD or PSNR.
      what_remains_open: Alignment between proxy metrics (e.g., SGCS, COM) and the
        downstream decisions users actually care about.
    - line: Comparable baselines and reporting
      what_it_solves: Making results auditable through common baselines, artifacts,
        and reporting conventions (e.g., open-source code, datasets).
      what_remains_open: Whether benchmark conclusions remain stable across implementations
        and compute budgets; reproducibility gaps.
    consensus:
    - Current world models lack spatial consistency, memory retention, and action
      fidelity; benchmarks must evaluate these beyond pixel-level quality.
    - Multi-dimensional evaluation (visual, geometric, physical, behavioral) is necessary
      to capture trade-offs between appearance and physics.
    - Open-source datasets and evaluation frameworks are essential for reproducibility
      and fair comparison.
    disagreements:
    - 'Which evaluation dimension is most critical: spatial consistency (LoopNav,
      MIND) vs. action controllability (ACT-Bench, GEM) vs. human preference (WorldLens).'
    - Domain-specific benchmarks (driving, Minecraft) vs. general embodied benchmarks
      (EWMBench); trade-off between realism and coverage.
    - Whether to include human-annotated preference scores or rely solely on automated
      metrics; subjectivity vs. scalability.
    open_questions:
    - How can benchmark conclusions be validated to transfer to real-world deployment,
      especially in safety-critical domains like autonomous driving?
    - What evaluation protocol can fairly compare single-agent vs. multi-agent world
      models without conflating environment complexity?
    - How to design metrics that capture long-term memory and causal reasoning without
      requiring expensive human annotation?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 构建共享任务和数据集，使世界模型的主张在不同方法和领域间具有可比性。
      尚未覆盖: 任务分布是否覆盖世界模型预期发挥作用的真实设置（如长时程、多智能体）。
    - 路线: 指标与压力测试设计
      解决的问题: 在总分（如FVD、PSNR）之外检验预测、可控性、鲁棒性和决策效用。
      尚未覆盖: 代理指标（如SGCS、COM）与用户真正关心的下游决策之间是否一致。
    - 路线: 可比基线与报告规范
      解决的问题: 通过统一基线、工件和报告规范（如开源代码、数据集）让结果可审计。
      尚未覆盖: 基准结论在不同实现和算力预算下是否稳定；可复现性缺口。
    共识:
    - 当前世界模型缺乏空间一致性、记忆保持和动作忠实度；基准必须超越像素级质量评估这些方面。
    - 多维评估（视觉、几何、物理、行为）对于捕捉外观与物理之间的权衡是必要的。
    - 开源数据集和评估框架对于可复现性和公平比较至关重要。
    分歧:
    - 哪个评估维度最关键：空间一致性（LoopNav, MIND）vs. 动作可控性（ACT-Bench, GEM）vs. 人类偏好（WorldLens）。
    - 领域特定基准（驾驶、Minecraft）vs. 通用具身基准（EWMBench）；真实性与覆盖范围之间的权衡。
    - 是否包含人类标注的偏好分数，还是仅依赖自动化指标；主观性与可扩展性。
    开放问题:
    - 如何验证基准结论能够迁移到真实世界部署，尤其是在自动驾驶等安全关键领域？
    - 什么评估协议可以公平比较单智能体与多智能体世界模型，而不混淆环境复杂性？
    - 如何设计能够捕捉长期记忆和因果推理的指标，而无需昂贵的人工标注？
