  related_work_outline:
  - 'Mainstream direction: Designing specialized benchmarks and datasets to evaluate
    world models on specific capabilities such as spatial consistency, memory, action
    control, and scene coherence across domains like autonomous driving and embodied
    AI.'
  - 'Shared research pattern: Each benchmark introduces a curated dataset and multi-dimensional
    metrics (e.g., scene graph consistency, memory consistency, action fidelity) to
    probe aspects beyond standard video generation quality.'
  - 'Key differences: Domain focus (driving vs. Minecraft vs. general embodied), evaluation
    dimensions (spatial vs. memory vs. action vs. multi-agent), and inclusion of human
    preference or not.'
  - 'Trend evolution: Benchmarks are moving from single-metric evaluations to full-spectrum
    assessments (visual, geometric, physical, behavioral) and from single-agent to
    multi-agent scenarios, with increasing emphasis on controllability and long-term
    consistency.'
  - 'Open questions: Whether benchmark conclusions generalize across implementations
    and compute budgets; alignment between proxy metrics and real-world decision utility;
    how to standardize evaluation across diverse domains.'
  related_work_outline_zh:
  - 主流方向：设计专门的基准和数据集，评估世界模型在空间一致性、记忆、动作控制和场景连贯性等特定能力，涵盖自动驾驶和具身AI等领域。
  - 研究共性：每个基准都引入精心策划的数据集和多维指标（如场景图一致性、记忆一致性、动作保真度），以探测标准视频生成质量之外的方面。
  - 关键差异：领域焦点（驾驶 vs. Minecraft vs. 通用具身）、评估维度（空间 vs. 记忆 vs. 动作 vs. 多智能体）以及是否包含人类偏好。
  - 趋势演进：基准从单一指标评估转向全频谱评估（视觉、几何、物理、行为），从单智能体扩展到多智能体场景，越来越强调可控性和长期一致性。
  - 开放问题：基准结论在不同实现和算力预算下是否稳定；代理指标与真实世界决策效用之间的一致性；如何跨不同领域标准化评估。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Creating shared tasks and datasets that make world-model claims
        comparable across different approaches.
      what_remains_open: Whether the task distribution covers the settings where world
        models are expected to help, e.g., rare events or multi-agent interactions.
    - line: Metric and stress-test design
      what_it_solves: Probing prediction, controllability, robustness, and decision
        utility beyond aggregate scores like FVD or PSNR.
      what_remains_open: Alignment between proxy metrics (e.g., scene graph consistency,
        action fidelity) and the downstream decisions users actually care about.
    - line: Comparable baselines and reporting
      what_it_solves: Making results auditable through common baselines, artifacts,
        and reporting conventions (e.g., open-source code, datasets).
      what_remains_open: Whether benchmark conclusions remain stable across implementations
        and compute budgets, and how to handle domain-specific baselines.
    consensus:
    - Current world models lack consistency in spatial memory, action control, and
      physical plausibility; generic video metrics are insufficient.
    - New benchmarks must include curated datasets and multi-dimensional metrics to
      capture these gaps.
    - Open-source release of datasets and code is critical for reproducibility and
      fair comparison.
    disagreements:
    - 'Domain focus: driving benchmarks (e.g., ACT-Bench, DrivingGen) emphasize trajectory-conditioned
      action control, while Minecraft benchmarks (e.g., LoopNav, Solaris) focus on
      spatial consistency and multi-agent interaction.'
    - 'Evaluation target: some benchmarks prioritize memory consistency (MIND), others
      scene consistency (EWMBench), and others full-spectrum fidelity (WorldLens).'
    - 'Interaction mode: closed-loop revisited evaluation (MIND) vs. open-loop generation;
      some include human preference, others rely solely on automated metrics.'
    open_questions:
    - How to ensure benchmark tasks cover the diverse real-world settings where world
      models are deployed, including rare events and multi-agent scenarios?
    - Can proxy metrics like scene graph consistency or action fidelity reliably predict
      downstream task performance in planning or control?
    - How to standardize evaluation across different domains (driving, embodied, gaming)
      to enable cross-domain comparison and transfer?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 构建共享任务和数据集，使世界模型的主张在不同方法间具有可比性。
      尚未覆盖: 任务分布是否覆盖世界模型预期发挥作用的真实设置，例如罕见事件或多智能体交互。
    - 路线: 指标与压力测试设计
      解决的问题: 在总分（如FVD、PSNR）之外检验预测、可控性、鲁棒性和决策效用。
      尚未覆盖: 代理指标（如场景图一致性、动作保真度）与用户真正关心的下游决策之间是否一致。
    - 路线: 可比基线与报告规范
      解决的问题: 通过统一基线、工件和报告规范（如开源代码、数据集）让结果可审计。
      尚未覆盖: 基准结论在不同实现和算力预算下是否稳定，以及如何处理领域特定的基线。
    共识:
    - 当前世界模型在空间记忆、动作控制和物理合理性方面缺乏一致性；通用视频指标不足以捕捉这些缺陷。
    - 新基准必须包含精心策划的数据集和多维指标来填补这些空白。
    - 数据集和代码的开源发布对于可重复性和公平比较至关重要。
    分歧:
    - 领域焦点：驾驶基准（如ACT-Bench、DrivingGen）强调轨迹条件化的动作控制，而Minecraft基准（如LoopNav、Solaris）侧重于空间一致性和多智能体交互。
    - 评估目标：一些基准优先考虑记忆一致性（MIND），另一些侧重场景一致性（EWMBench），还有一些追求全频谱保真度（WorldLens）。
    - 交互模式：闭环可复现评估（MIND）与开环生成；有些包含人类偏好，有些仅依赖自动指标。
    开放问题:
    - 如何确保基准任务覆盖世界模型部署的真实场景，包括罕见事件和多智能体交互？
    - 场景图一致性或动作保真度等代理指标能否可靠预测下游规划或控制任务的性能？
    - 如何跨不同领域（驾驶、具身、游戏）标准化评估，以实现跨领域比较和迁移？
