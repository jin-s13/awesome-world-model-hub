      intelligent decision-making in dynamic environments.
    - Current evaluation metrics overemphasize visual fidelity and underrepresent
      physical persistence, causal reasoning, and policy utility.
    - Key challenges include action-conditioned controllability, long-horizon interactions,
      and real-time responsiveness.
    - A shift toward functional benchmarks that test counterfactual reasoning and
