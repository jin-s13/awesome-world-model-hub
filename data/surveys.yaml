    consensus:
    - The main body of work is organized around Comparative evaluation synthesis,
      Open problem and gap mapping, Taxonomy and roadmap synthesis, with a shared
      goal to organize a fragmented literature into directions, comparisons, gaps,
      and roadmaps.
    - A common pattern is to cluster prior work by problem, compare evidence standards,
      and surface unresolved tensions, rather than treating paper titles or tags as
      the unit of comparison.
    disagreements:
    - The substantive split is between taxonomy scope, evaluation comparability, and
      prioritization of open problems; those choices change the input-output contract,
      evidence standard, and failure modes.
    - The unresolved boundary is whether the compared results are actually compatible
      across settings; another recurring gap is prioritization of which gaps matter
      most for progress.
    open_questions:
    - Which representation choices remain useful when the downstream task, controller,
      or data distribution changes?
    - Do current evaluation protocols measure decision utility directly, or mostly
      proxy quality signals?
    trend_evolution: Across 2022-2026, the topic moves from isolated modeling claims
      toward work that ties organize a fragmented literature into directions, comparisons,
      gaps, and roadmaps to stronger evidence and clearer boundaries.
