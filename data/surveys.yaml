    - 范围：覆盖多领域的通用世界模型 vs. 具有定制分类法的特定领域综述（自动驾驶、3D/4D）。
    - 视频生成的角色：部分将其视为世界模型核心组件，部分批评其无状态且缺乏显式状态构建。
    开放问题:
    - 如何以标准化、可重复的方式评估世界模型的反事实推理和策略优化能力？
    - 需要哪些架构创新才能实现超越当前视频生成模型的长期时间稳定性和因果理解？
