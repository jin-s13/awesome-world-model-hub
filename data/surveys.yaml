  related_work_outline_zh:
  - 主流方向：theory方向中围绕AI、world models、CV、LG的研究正在收敛到统一框架，在单个Transformer架构中耦合视频和动作扩散，每种模态具有独立的扩散时间步、将预训练视频扩散模型适配为动作条件化的世界模型，无需访问模型参数、动作条件世界模型预训练，学习超越外观级视频生成的可迁移动力学先验。
  - 研究共性：高分论文通常把统一世界模型（UWM）在一个统一的Transformer架构中集成了动作扩散过程和视频扩散过程，其中独立的扩散时间步控制每种模态。通过控制每个扩散时间步，UWM可以灵活地表示策略、前向动力学、逆动力学或视频生…、AVID在小型领域特定的动作标签视频数据集上训练一个适配器。该适配器使用学习到的掩码修改闭源预训练视频扩散模型的中间输出，从而无需微调原始模型即可生成动作条件化视频。在视频游戏和真实世界机器人数据上进行评估…、本文在大规模机器人操作数据上使用真实动作标注预训练了一个多视角扩散世界模型
    A2World，以从动作预测视觉场景演化。然后将预训练模型适配为两种下游形式：用于策略评估和假设分析的模拟器 (A2World-si…与UWM能够在大规模多任务机器人数据集上进行有效预训练，产生比模仿学习更具泛化性和鲁棒性的策略。此外，它通过独立控制模态特定的扩散时间步，促进了从无动作视频数据中学习，进一步提升了微调策略的性能。、AVID在视频游戏和真实世界机器人数据上均优于现有的扩散模型适配基线，表明预训练视频扩散模型可以被适配为用于决策的准确世界模型。、动作条件世界模型预训练产生了可迁移动力学先验，改进了基于模拟器的策略评估和以策略为中心的动作预测，这在仿真基准和真实机器人实验中得到了验证。结合起来，而不是只停留在概念声明。
  - 关键差异：论文之间的差异主要体现在AI、world models、CV、LG、world model，因此更值得比较表示方式、监督信号和决策时接口。
  - 趋势演进：从 2023 到 2026，研究重心正在从单点模型主张转向可交互系统、标准化基准和可横向比较的证据。
  - 开放问题：反复出现的缺口包括需要小型领域特定的动作标签视频数据集来训练适配器，这在某些应用中可能仍然稀缺、当前世界模型形成了信息瓶颈，想象视图无法丰富细粒度推理、该方法主要在接触丰富的操作任务上评估，未展示对其他领域的泛化能力。，这些应成为后续文献综述的主线。
