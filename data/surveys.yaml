  related_work_outline:
  - 'Mainstream direction: Formalizing world models through taxonomies, capability
    levels, and defining principles such as consistency and sufficiency.'
  - 'Shared research pattern: Papers propose conceptual frameworks (taxonomies, principles)
    and then evaluate existing models against them, often without new experiments.'
  - 'Key differences: Taxonomies differ in axes (capability levels vs. latent state
    roles vs. consistency types); scaling analyses show environment-dependent regimes;
    representation theories diverge on whether equivariance must be exact or learned.'
  - 'Trend evolution: The field is moving from isolated empirical world models toward
    unified theoretical frameworks, with increasing emphasis on functional benchmarks
    and task-specific state design.'
  - 'Open questions: How to validate formal conditions empirically? Can scaling laws
    predict failure modes? Do taxonomies change model design or evaluation practice?'
  related_work_outline_zh:
  - 主流方向：通过分类法、能力层级和一致性/充分性等定义性原则对世界模型进行形式化。
  - 研究共性：论文提出概念框架（分类法、原则），然后据此评估现有模型，通常不进行新实验。
  - 关键差异：分类法轴不同（能力层级 vs 潜在状态角色 vs 一致性类型）；缩放分析显示环境依赖的机制；表示理论在等变性是否必须精确或可学习上存在分歧。
  - 趋势演进：该领域正从孤立的经验世界模型转向统一的理论框架，越来越强调功能基准和任务特定状态设计。
  - 开放问题：如何实证验证形式条件？缩放规律能否预测失败模式？分类法是否改变模型设计或评估实践？
  literature_review:
    line_of_work_matrix:
    - line: Formal definitions and assumptions (taxonomies, principles)
      what_it_solves: Clarifying what a world model must represent and under which
        assumptions claims hold, e.g., capability levels, latent state roles, consistency
        types.
      what_remains_open: Whether formal conditions match empirical model behavior
        in realistic settings; taxonomies lack operationalization into evaluation
        metrics.
    - line: Scaling laws and guarantees
      what_it_solves: Connecting model size, data, objectives, or assumptions to expected
        behavior, e.g., transformer scaling on Atari, structured building blocks.
      what_remains_open: Direct validation that claimed laws predict failures and
        transfer across domains; scaling regimes are environment-dependent.
    - line: Representation learning theory (equivariance, sufficiency, dynamics alignment)
      what_it_solves: Providing theoretical guarantees for zero-shot generalization
        via symmetry, sufficiency constraints, or self-supervised dynamics prediction.
      what_remains_open: Whether theoretical assumptions hold at scale and in real-world
        tasks; integration with broader world model architectures.
    consensus:
    - Current world models lack principled theoretical foundations that define essential
      properties.
    - Evaluation should move beyond visual fidelity toward functional benchmarks testing
      persistence, causality, and task-specific sufficiency.
    - Scaling model size does not guarantee monotonic improvement; joint training
      across environments can stabilize scaling.
    - Latent state design should be driven by the task's sufficiency constraints rather
      than information preservation.
    disagreements:
    - 'Taxonomy axes: capability levels (predictor/simulator/evolver) vs. latent state
      roles (predictive embedding, belief state, etc.) vs. consistency types (modal/spatial/temporal).'
    - Whether exact equivariance is necessary for zero-shot generalization or can
      be approximated through data augmentation.
    - Whether scaling laws are universal across environments or fundamentally environment-dependent.
    - 'Role of interpretability: structured building blocks (HMM/sLDS) vs. neural
      black-box models.'
    open_questions:
    - How can sufficiency constraints be operationalized into measurable evaluation
      metrics?
    - Do scaling laws derived from Atari transfer to more complex, high-dimensional
      environments?
    - Can equivariant world models be scaled to large, real-world tasks without losing
      exact invariance?
    - Do proposed taxonomies actually influence how researchers design and evaluate
      world models, or remain descriptive?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 形式化定义与假设（分类法、原则）
      解决的问题: 澄清世界模型必须表示什么以及主张在哪些假设下成立，例如能力层级、潜在状态角色、一致性类型。
      尚未覆盖: 形式条件是否符合真实场景中的经验模型行为；分类法缺乏可操作化的评估指标。
    - 路线: 缩放规律与保证
      解决的问题: 将模型规模、数据、目标或假设与预期行为联系起来，例如Atari上的Transformer缩放、结构化构建块。
      尚未覆盖: 这些规律是否能预测失败和迁移仍缺少直接验证；缩放机制具有环境依赖性。
    - 路线: 表示学习理论（等变性、充分性、动态对齐）
      解决的问题: 通过对称性、充分性约束或自监督动态预测为零样本泛化提供理论保证。
      尚未覆盖: 理论假设在大规模真实任务中是否成立；与更广泛世界模型架构的集成。
    共识:
    - 当前世界模型缺乏定义基本属性的原则性理论基础。
    - 评估应从视觉保真度转向测试持久性、因果性和任务特定充分性的功能基准。
    - 模型规模增大并不保证单调改进；多环境联合训练可以稳定缩放。
    - 潜在状态设计应由任务的充分性约束驱动，而非信息保留。
    分歧:
    - 分类法轴：能力层级（预测器/模拟器/演化器）vs 潜在状态角色（预测嵌入、信念状态等）vs 一致性类型（模态/空间/时间）。
    - 精确等变性对于零样本泛化是否必要，还是可以通过数据增强近似实现。
    - 缩放规律是跨环境通用还是根本上依赖于环境。
    - 可解释性的作用：结构化构建块（HMM/sLDS）vs 神经黑盒模型。
    开放问题:
    - 如何将充分性约束操作化为可测量的评估指标？
    - 从Atari得出的缩放规律能否迁移到更复杂的高维环境？
    - 等变世界模型能否扩展到大规模真实任务而不损失精确不变性？
    - 提出的分类法是否真正影响研究者设计和评估世界模型的方式，还是仅停留在描述层面？
