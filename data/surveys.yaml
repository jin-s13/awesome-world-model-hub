  - 主流方向：应用方向中围绕RO、world model、CV、AI的研究正在收敛到将生成损失与MAE风格的特征级上下文学习相结合、利用语言的自然组合性将指令解析为低级原语，从而分解视频生成、提出了DIAMOND，一种在扩散世界模型中训练的强化学习智能体，标志着从离散潜变量世界模型到基于扩散的世界模型的范式转变。。
  - 研究共性：高分论文通常把模型采用扩散变换器（DiT）架构，并增加额外的掩码构建任务。引入扩散相关掩码令牌，使用行式掩码进行移位自注意力以将掩码构建扩展到时空域，同时配备行式跨视图模块。在包括Nuscenes、OpenDV-2K和Wa…、RoboDreamer通过将语言指令解析为一组低级原语来学习组合世界模型，每个原语对应一个独立的视频生成模型。推理时，新指令被分解为先前见过的原语，相应模型组合生成视频计划。该方法还支持额外目标图像作为多模态…、DIAMOND使用扩散模型生成环境动态，取代了传统的离散潜变量方法。智能体完全在此扩散世界模型内进行Atari游戏训练，并使用人类归一化得分作为指标在Atari
    100k基准测试上进行评估。此外，世界模型还在…与该方法在正常验证（Nuscenes）、长时域展开（OpenDV-2K）和零样本验证（Waymo）数据集上均显著优于最先进的驾驶世界模型。、该方法成功合成RT-X数据集中未见目标的视频计划，在仿真中实现成功的机器人执行，并显著优于单一基线视频生成方法。、DIAMOND在Atari
    100k基准测试上取得了1.46的平均人类归一化得分，为完全在世界模型内训练的智能体设立了新的最先进水平。结合起来，而不是只停留在概念声明。
