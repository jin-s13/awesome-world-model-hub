  related_work_outline:
  - 'Mainstream direction: Diffusion and transformer-based world models for high-fidelity
    video prediction and latent dynamics learning, applied to robotics and driving.'
  - 'Shared research pattern: Conditioning world models on actions, context, or language;
    using self-supervised objectives (mask reconstruction, diffusion, VAE); evaluating
    on standard benchmarks or real-world platforms.'
  - 'Key differences: Representation space (pixel vs. latent vs. dense features),
    training objective (diffusion vs. VAE vs. mask reconstruction), planning integration
    (imagination rollouts vs. direct policy), and generalization strategy (context
    conditioning, compositionality, physics priors).'
  - 'Trend evolution: From Dreamer-based latent state-space models (2018–2022) to
    transformer/diffusion architectures (2023–2024), and recently to unified video-action
    pretraining and physics-informed models (2025–2026).'
  - 'Open questions: How to isolate method contribution from system choices; whether
    gains transfer beyond reported tasks; how to ensure physical consistency and long-horizon
    stability in video predictions.'
  related_work_outline_zh:
  - 主流方向：基于扩散和Transformer的世界模型，用于高保真视频预测和潜在动力学学习，应用于机器人和驾驶。
  - 研究共性：以动作、上下文或语言为条件；使用自监督目标（掩码重建、扩散、VAE）；在标准基准或真实平台上评估。
  - 关键差异：表示空间（像素 vs. 潜在 vs. 密集特征）、训练目标（扩散 vs. VAE vs. 掩码重建）、规划集成（想象展开 vs. 直接策略）、泛化策略（上下文条件、组合性、物理先验）。
  - 趋势演进：从Dreamer潜在状态空间模型（2018–2022）到Transformer/扩散架构（2023–2024），再到最近的统一视频-动作预训练和物理信息模型（2025–2026）。
  - 开放问题：如何隔离方法贡献与系统选择；收益能否迁移到报告任务之外；如何确保视频预测的物理一致性和长时域稳定性。
  literature_review:
    line_of_work_matrix:
    - line: Method representation and objective design
      what_it_solves: Turning world-model ideas into concrete architectures, losses,
        and training recipes (e.g., mask reconstruction, diffusion, VAE, physics-informed
        objectives).
      what_remains_open: Which algorithmic choices transfer beyond the reported task
        family; whether the proposed representation generalizes to unseen dynamics
        or modalities.
    - line: Planning and action-interface methods
      what_it_solves: 'Connecting learned dynamics to decision-time interfaces: imagination-based
        planning, context-conditioned policies, language-guided video generation,
        or unified video-action diffusion.'
      what_remains_open: How much of the gain comes from the model versus the planner,
        controller, or task prior; whether the interface scales to real-world deployment.
    - line: Method evidence and ablation protocol
      what_it_solves: Separating method contribution from dataset, baseline, metric,
        and implementation effects through controlled experiments.
      what_remains_open: Whether evidence isolates the proposed method rather than
        surrounding system choices; many evaluations are limited to few tasks or platforms,
        leaving broader verification gaps.
    consensus:
    - World models increasingly adopt diffusion or transformer architectures for video
      prediction, replacing or augmenting recurrent latent state-space models.
    - Conditioning on actions, context (e.g., mass, dimensions), or language is a
      common strategy to improve generalization and enable planning.
    - Evaluation on standard benchmarks (Atari, CARL, NuScenes) or real-world robot
      platforms is standard, but real-world deployment remains limited to a few platforms.
    - Self-supervised objectives (mask reconstruction, diffusion loss, VAE) are the
      dominant training signals, often combined with auxiliary tasks like depth prediction
      or keypoint dynamics.
    disagreements:
    - 'Representation space: pixel-level video generation vs. latent state-space vs.
      dense feature space (e.g., DINOv2) for dynamics modeling.'
    - 'Training objective: mask reconstruction (MAE-style) vs. diffusion loss vs.
      variational lower bound; some combine multiple losses.'
    - 'Planning integration: imagination-based rollouts (Dreamer) vs. direct policy
      learning from video diffusion vs. compositional video generation from language.'
    - 'Generalization strategy: context conditioning on observable variables vs. compositional
      decomposition of primitives vs. physics-informed inductive biases.'
    open_questions:
    - How to ensure physical consistency and long-horizon stability in video predictions
      without explicit physics simulation?
    - Can world models trained on offline data generalize to novel dynamics or tasks
      without fine-tuning, and what minimal inductive biases are needed?
    - What is the most effective way to isolate the method's contribution from the
      planner, controller, or dataset effects in reported results?
    - How to scale world model pretraining across diverse robotic datasets while maintaining
      sample efficiency and transferability?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 方法表示与目标设计
      解决的问题: 将世界模型想法落实为具体架构、损失函数和训练配方（如掩码重建、扩散、VAE、物理信息目标）。
      尚未覆盖: 哪些算法选择能迁移到报告任务族之外；提出的表示是否能泛化到未见动力学或模态。
    - 路线: 规划与动作接口方法
      解决的问题: 将学习到的动力学连接到决策时接口：基于想象的规划、上下文条件策略、语言引导视频生成或统一视频-动作扩散。
      尚未覆盖: 收益有多少来自模型本身，而不是规划器、控制器或任务先验；接口是否能扩展到真实部署。
    - 路线: 方法证据与消融协议
      解决的问题: 通过受控实验区分方法贡献与数据集、基线、指标和实现因素。
      尚未覆盖: 证据是否真正隔离了方法贡献，而不是周边系统选择；许多评估仅限于少数任务或平台，留下更广泛的验证缺口。
    共识:
    - 世界模型越来越多地采用扩散或Transformer架构进行视频预测，取代或增强循环潜在状态空间模型。
    - 以动作、上下文（如质量、尺寸）或语言为条件是提高泛化能力和实现规划的常见策略。
    - 在标准基准（Atari、CARL、NuScenes）或真实机器人平台上进行评估是标准做法，但真实部署仍限于少数平台。
    - 自监督目标（掩码重建、扩散损失、VAE）是主要的训练信号，常与辅助任务（如深度预测、关键点动力学）结合。
    分歧:
    - 表示空间：像素级视频生成 vs. 潜在状态空间 vs. 密集特征空间（如DINOv2）用于动力学建模。
    - 训练目标：掩码重建（MAE风格） vs. 扩散损失 vs. 变分下界；有些组合多种损失。
    - 规划集成：基于想象的展开（Dreamer） vs. 从视频扩散直接学习策略 vs. 从语言组合视频生成。
    - 泛化策略：对可观测变量的上下文条件 vs. 原语的组合分解 vs. 物理信息归纳偏置。
    开放问题:
    - 如何在不使用显式物理模拟的情况下确保视频预测的物理一致性和长时域稳定性？
    - 在离线数据上训练的世界模型能否泛化到未见动力学或任务而无需微调，需要哪些最小归纳偏置？
    - 在报告结果中，最有效的方法是什么来隔离方法贡献与规划器、控制器或数据集效应？
    - 如何在保持样本效率和可迁移性的同时，将世界模型预训练扩展到多样化的机器人数据集？
