    研究路线矩阵:
    - 路线: 分类体系与路线图综合
      解决的问题: 将碎片化领域映射为连贯的方向、里程碑和研究缺口，涵盖视频生成、自动驾驶和具身AI等领域。
      尚未覆盖: 综合是否由系统证据支撑而非选择性举例；缺口优先级排序仍主观。
    - 路线: 对比评测综合
      解决的问题: 总结不同评测选择（视觉逼真度、反事实推理、策略效用）如何影响跨论文结论，并提出统一评测框架。
      尚未覆盖: 被比较的结果在不同设置（如开环vs闭环、不同模拟器）下是否真正兼容；所提框架缺乏实证验证。
    - 路线: 开放问题与缺口映射
      解决的问题: 将广泛文献覆盖转化为具体下一步研究问题，如状态构建、长时记忆、因果推理和实时交互。
      尚未覆盖: 哪些缺口最值得优先解决仍待排序；许多提议架构（如GLP）仍停留在推测阶段，未实现。
    共识:
    - 世界模型对跨多个领域的决策、规划和模拟至关重要。
    - 当前评估指标过度强调视觉逼真度，低估功能效用（反事实推理、策略改进）。
    - 需要统一的分类体系和标准化基准来比较不同方法。
    - 现有生成模型缺乏显式状态构建和长期持久性，限制了其作为世界模型的使用。
    分歧:
    - 视频生成模型是否算作世界模型：有人认为它们无状态、缺乏显式状态，另一些人视其为初步的世界模拟器。
    - 评估焦点：视觉逼真度 vs. 决策效用（例如L0–L7阶梯 vs. 传统指标）。
    - 潜在表示 vs. 像素级生成的角色：一些综述倡导潜在世界模型以提高效率，另一些聚焦3D/4D几何建模。
    - 是否在综述中提出新架构（如GLP）还是保持描述性。
    开放问题:
    - 如何设计测试因果推理和反事实动作保真度的评估协议？
    - 如何在生成式世界模型中实现显式状态构建和长期记忆？
    - 如何确保跨不同领域（驾驶、机器人、视频游戏）和设置（开环vs闭环）的评估兼容性？
    - 如何为领域进展优先排序开放缺口（如持久性、因果性、实时交互）？
    - 如何实证验证所提分类体系和评估框架？
