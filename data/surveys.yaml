    v3，以结合上下文来推断潜在马尔可夫状态并建模潜在动力学。。
  - 研究共性：高分论文通常把模型采用扩散变换器（DiT）架构，并增加额外的掩码构建任务。引入扩散相关掩码令牌，使用行式掩码进行移位自注意力以将掩码构建扩展到时空域，同时配备行式跨视图模块。在包括Nuscenes、OpenDV-2K和Wa…、RAE-NWM使用表示自编码器将观测编码到密集视觉表示空间（DINOv2特征）。它采用带有解耦扩散Transformer头（CDiT-DH）的条件扩散Transformer来建模连续的动作条件状态转换，并引入…、本文引入了cRSSM，这是对Dreamer
    v3世界模型的修改，显式地将潜在状态推断和动力学条件化于可观测的上下文值（如质量或尺寸）。该模型在CARL基准套件的两个任务上进行训练和评估，该套件专为上下文强化学…与该方法在正常验证（Nuscenes）、长时域展开（OpenDV-2K）和零样本验证（Waymo）数据集上均显著优于最先进的驾驶世界模型。、在密集视觉表示空间中建模序列展开提高了结构稳定性和动作精度，有利于下游规划与导航任务。、实验表明，将上下文纳入世界模型显著提升了学习策略的零样本泛化能力，优于基线Dreamer
    v3。定性分析显示，cRSSM学会了将潜在状态与上下文解耦，使得模型能够为未见上下文生成准确的梦境。结合起来，而不是只停留在概念声明。
  - 关键差异：论文之间的差异主要体现在CV、AI、RO、world models、world model，因此更值得比较表示方式、监督信号和决策时接口。
