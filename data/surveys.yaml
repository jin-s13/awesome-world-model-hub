  related_work_outline:
  - 'Mainstream direction: Building real-time interactive world models that generate
    controllable video sequences for closed-loop applications in robotics, autonomous
    driving, and gaming.'
  - 'Shared research pattern: Use of autoregressive or diffusion architectures with
    action conditioning; emphasis on open-source release, reproducibility, and evaluation
    of both visual quality and action fidelity.'
  - 'Key differences: Architecture choice (autoregressive vs diffusion), training
    data source (synthetic vs real), target domain (physical robots vs driving vs
    games), and efficiency strategy (key frame reasoning, distillation, parallel decoding).'
  - 'Trend evolution: From offline world models for robot learning (2022) to real-time
    interactive systems (2025–2026), with growing focus on action controllability,
    deployment speed, and open-source infrastructure.'
  - 'Open questions: Long-term temporal consistency without degradation; generalization
    across diverse environments and tasks; action fidelity under distribution shift;
    scalability to complex action spaces and multi-sensor setups.'
  related_work_outline_zh:
  - 主流方向：构建实时交互式世界模型，为机器人、自动驾驶和游戏等闭环应用生成可控视频序列。
  - 研究共性：采用自回归或扩散架构并加入动作条件；强调开源、可复现，以及视觉质量和动作忠实度的联合评估。
  - 关键差异：架构选择（自回归 vs 扩散）、训练数据来源（合成 vs 真实）、目标领域（物理机器人 vs 驾驶 vs 游戏）、效率策略（关键帧推理、蒸馏、并行解码）。
  - 趋势演进：从2022年离线机器人世界模型发展到2025–2026年的实时交互系统，动作可控性、部署速度和开源基础设施日益重要。
  - 开放问题：长时域一致性不退化；跨环境和任务的泛化；分布外场景下的动作忠实度；复杂动作空间和多传感器设置的可扩展性。
  literature_review:
    line_of_work_matrix:
    - line: Real-time interactive world models for closed-loop control
      what_it_solves: Generating controllable video sequences in real time for autonomous
        driving, robotics, and game environments, enabling closed-loop simulation
        and interaction.
      what_remains_open: Balancing speed, visual fidelity, long-term consistency,
        and action adherence across diverse domains; generalization beyond training
        environments.
    - line: World models for physical robot learning without simulators
      what_it_solves: Enabling robots to learn behaviors directly from real-world
        interaction using learned world models, avoiding the sim-to-real gap.
      what_remains_open: Scalability to more complex tasks and robots; reliance on
        physical hardware and reset mechanisms; hyperparameter sensitivity.
    - line: Benchmarks and evaluation for action-controllable world models
      what_it_solves: Providing standardized datasets and metrics to quantify how
        well world models follow action commands, particularly in autonomous driving.
      what_remains_open: Coverage of diverse action modalities and long-tail scenarios;
        correlation between benchmark metrics and downstream task performance.
    - line: Efficient world model inference via key frame reasoning
      what_it_solves: Reducing computational cost by generating only semantically
        important frames and interpolating the rest, achieving speedups for robotic
        tasks.
      what_remains_open: Generalizability of key frame selection across different
        tasks and environments; trade-off between speed and video quality.
    consensus:
    - World models should be interactive and controllable via actions, with evaluation
      covering both visual quality and action fidelity.
    - Real-time or near-real-time inference is a critical requirement for closed-loop
      deployment.
    - Open-source release of code, datasets, and benchmarks is widely adopted to support
      reproducibility and community progress.
    - Autoregressive and diffusion-based architectures are the dominant backbones,
      often combined with action conditioning mechanisms.
    disagreements:
    - 'Architecture choice: autoregressive Transformers (e.g., MineWorld) vs diffusion
      models (e.g., Yume) vs hybrid autoregressive-denoising (e.g., Astra).'
    - 'Training data source: synthetic data from game engines (Matrix-Game 2.0) vs
      real-world driving logs (FAR-Drive) vs physical robot interaction (DayDreamer).'
    - 'Target domain and interaction mode: keyboard-based exploration (Yume) vs trajectory
      commands (Terra ACT-Bench) vs learned policies (DayDreamer).'
    - 'Efficiency approach: key frame reasoning (KeyWorld) vs distillation (Matrix-Game
      2.0) vs parallel decoding (MineWorld).'
    open_questions:
    - How can world models maintain long-term temporal consistency without degradation
      over hundreds of generated frames?
    - What evaluation protocols best predict downstream task performance (e.g., planning,
      control) from world model fidelity metrics?
    - How to ensure action fidelity under out-of-distribution actions or novel environment
      dynamics?
    - Can key frame reasoning generalize beyond scripted robotic tasks to open-ended
      interactive scenarios?
    - What is the minimal computational budget required for real-time interactive
      world models without sacrificing controllability?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 用于闭环控制的实时交互式世界模型
      解决的问题: 实时生成可控视频序列，用于自动驾驶、机器人和游戏环境，支持闭环模拟与交互。
      尚未覆盖: 速度、视觉保真度、长时一致性和动作遵循之间的平衡；跨领域泛化能力。
    - 路线: 无需模拟器的物理机器人学习世界模型
      解决的问题: 通过真实世界交互直接学习机器人行为，避免模拟到真实的差距。
      尚未覆盖: 扩展到更复杂任务和机器人；对物理硬件和重置机制的依赖；超参数敏感性。
    - 路线: 动作可控世界模型的基准与评估
      解决的问题: 提供标准化数据集和指标，量化世界模型遵循动作指令的能力，尤其用于自动驾驶。
      尚未覆盖: 覆盖多种动作模态和长尾场景；基准指标与下游任务性能的相关性。
    - 路线: 基于关键帧推理的高效世界模型推理
      解决的问题: 仅生成语义关键帧并插值其余帧，降低计算成本，加速机器人任务。
      尚未覆盖: 关键帧选择在不同任务和环境中的泛化性；速度与视频质量之间的权衡。
    共识:
    - 世界模型应支持交互和动作控制，评估需同时考虑视觉质量和动作忠实度。
    - 实时或近实时推理是闭环部署的关键需求。
    - 开源代码、数据集和基准被广泛采用，以支持可复现性和社区进展。
    - 自回归和扩散架构是主流骨干，常与动作条件机制结合。
    分歧:
    - 架构选择：自回归Transformer（如MineWorld） vs 扩散模型（如Yume） vs 混合自回归去噪（如Astra）。
    - 训练数据来源：游戏引擎合成数据（Matrix-Game 2.0） vs 真实驾驶日志（FAR-Drive） vs 物理机器人交互（DayDreamer）。
    - 目标领域与交互模式：键盘探索（Yume） vs 轨迹指令（Terra ACT-Bench） vs 学习策略（DayDreamer）。
    - 效率策略：关键帧推理（KeyWorld） vs 蒸馏（Matrix-Game 2.0） vs 并行解码（MineWorld）。
    开放问题:
    - 世界模型如何在数百帧生成中保持长时域一致性而不退化？
    - 哪些评估协议能最好地从世界模型保真度指标预测下游任务（如规划、控制）性能？
    - 如何在分布外动作或新环境动态下确保动作忠实度？
    - 关键帧推理能否从脚本化机器人任务泛化到开放式交互场景？
    - 实时交互式世界模型所需的最小计算预算是多少，同时不牺牲可控性？
