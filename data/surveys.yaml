  related_work_outline:
  - 'Mainstream direction: Interactive world models as runnable systems for closed-loop
    simulation and control across robotics, autonomous driving, and game environments.'
  - 'Shared research pattern: Use of autoregressive or diffusion architectures to
    generate future frames conditioned on actions, with emphasis on real-time or near-real-time
    inference.'
  - 'Key differences: Choice of architecture (autoregressive Transformer vs. diffusion),
    domain (physical robots vs. driving vs. games), evaluation focus (action fidelity
    vs. visual quality vs. speed), and training data source (real vs. synthetic).'
  - 'Trend evolution: From offline world model learning on physical robots (2022)
    to real-time interactive systems with streaming video generation (2025–2026),
    with increasing attention to action controllability and deployment efficiency.'
  - 'Open questions: How to maintain long-horizon temporal consistency without degradation;
    how to generalize across diverse domains and sensor configurations; how to standardize
    evaluation of action fidelity and interactivity.'
  related_work_outline_zh:
  - 主流方向：面向机器人、自动驾驶和游戏环境的交互式世界模型可运行系统，用于闭环模拟与控制。
  - 研究共性：采用自回归或扩散架构，基于动作条件生成未来帧，并强调实时或近实时推理。
  - 关键差异：架构选择（自回归Transformer vs. 扩散）、领域（物理机器人 vs. 驾驶 vs. 游戏）、评估重点（动作忠实度 vs. 视觉质量 vs.
    速度）、训练数据来源（真实 vs. 合成）。
  - 趋势演进：从2022年物理机器人上的离线世界模型学习，到2025–2026年具备流式视频生成的实时交互系统，动作可控性和部署效率日益受到关注。
  - 开放问题：如何在不退化的情况下保持长时域一致性；如何跨领域和传感器配置泛化；如何标准化评估动作忠实度和交互性。
  literature_review:
    line_of_work_matrix:
    - line: Runnable pipelines and deployment stacks
      what_it_solves: Turning world model ideas into end-to-end workflows for data,
        training, inference, and evaluation across real and simulated environments.
      what_remains_open: How well the stack survives external deployment, hardware
        changes, and user-specific settings; limited evidence on cross-platform reproducibility.
    - line: Real-time and interactive serving
      what_it_solves: Meeting latency and interactivity requirements for closed-loop
        use, enabling real-time video generation at 4–25 FPS with action control.
      what_remains_open: Trade-offs between speed, fidelity, controllability, and
        system complexity; long-horizon consistency under interactive conditions.
    - line: Artifacts and reproducible engineering
      what_it_solves: Making systems inspectable and reusable through open-source
        code, datasets, benchmarks, and evaluation frameworks.
      what_remains_open: Independent reproduction across teams, datasets, and infrastructure
        environments; verification of claimed performance without access to proprietary
        hardware.
    consensus:
    - World models can serve as interactive simulators for closed-loop control in
      robotics, driving, and games.
    - Autoregressive and diffusion-based architectures are both viable for generating
      future frames conditioned on actions.
    - Real-time or near-real-time inference is a key requirement for practical deployment.
    - Evaluation should consider both visual quality and action fidelity, though metrics
      vary across domains.
    disagreements:
    - 'Architecture choice: autoregressive Transformers (MineWorld, FAR-Drive) vs.
      diffusion models (Yume, Matrix-Game 2.0) vs. hybrid denoising (Astra).'
    - 'Domain focus: physical robot learning (DayDreamer) vs. autonomous driving (Terra,
      FAR-Drive) vs. game environments (MineWorld, Yume, Matrix-Game 2.0).'
    - 'Evaluation target: some prioritize action controllability (Terra, Astra), others
      emphasize visual quality and speed (MineWorld, Matrix-Game 2.0).'
    - 'Training data: real-world data (DayDreamer, nuScenes) vs. synthetic data from
      game engines (Matrix-Game 2.0).'
    open_questions:
    - How to achieve long-term temporal and cross-view consistency without degradation
      in autoregressive or diffusion-based generation?
    - Can a single world model architecture generalize across robotics, driving, and
      game domains without domain-specific tuning?
    - What standardized metrics best capture action fidelity and interactivity for
      fair comparison across systems?
    - How to ensure robustness to distribution shift when deploying world models in
      unseen real-world environments?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 可运行流水线与部署栈
      解决的问题: 将世界模型想法转化为覆盖数据、训练、推理和评测的端到端工作流，适用于真实和模拟环境。
      尚未覆盖: 系统栈在外部部署、硬件变化和用户特定设置下的可靠性；跨平台可复现性的证据不足。
    - 路线: 实时与交互式服务
      解决的问题: 满足闭环使用中的延迟和交互需求，实现4–25 FPS的实时视频生成与动作控制。
      尚未覆盖: 速度、保真度、可控性和系统复杂度之间的权衡；交互条件下的长时域一致性。
    - 路线: 工件与可复现工程
      解决的问题: 通过开源代码、数据集、基准和评估框架使系统可检查、可复用。
      尚未覆盖: 跨团队、数据集和基础设施环境的独立复现；在无专有硬件条件下验证声称性能。
    共识:
    - 世界模型可作为机器人、驾驶和游戏闭环控制的交互式模拟器。
    - 自回归和扩散架构均可用于基于动作条件的未来帧生成。
    - 实时或近实时推理是实际部署的关键要求。
    - 评估应同时考虑视觉质量和动作忠实度，但各领域指标不同。
    分歧:
    - 架构选择：自回归Transformer（MineWorld, FAR-Drive） vs. 扩散模型（Yume, Matrix-Game 2.0） vs.
      混合去噪（Astra）。
    - 领域焦点：物理机器人学习（DayDreamer） vs. 自动驾驶（Terra, FAR-Drive） vs. 游戏环境（MineWorld, Yume,
      Matrix-Game 2.0）。
    - 评估目标：部分优先考虑动作可控性（Terra, Astra），另一些强调视觉质量和速度（MineWorld, Matrix-Game 2.0）。
    - 训练数据：真实世界数据（DayDreamer, nuScenes） vs. 游戏引擎合成数据（Matrix-Game 2.0）。
    开放问题:
    - 如何在自回归或扩散生成中实现长时域和跨视图一致性而不退化？
    - 单一世界模型架构能否无需领域特定调整即可泛化到机器人、驾驶和游戏？
    - 哪些标准化指标能最好地捕捉动作忠实度和交互性，以便跨系统公平比较？
    - 在未见过的真实环境中部署世界模型时，如何确保对分布偏移的鲁棒性？
