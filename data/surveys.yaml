    consensus:
    - The main body of work is organized around Formal definitions and assumptions,
      Scaling laws and guarantees, Conceptual taxonomy and boundaries, with a shared
      goal to clarify definitions, assumptions, laws, and boundaries behind world-model
      claims.
    - A common pattern is to state a formal or conceptual claim, identify the conditions
      under which it holds, and connect it to evaluation criteria, rather than treating
      paper titles or tags as the unit of comparison.
    disagreements:
    - The substantive split is between formal guarantees, conceptual taxonomies, and
      empirical validity of assumptions; those choices change the input-output contract,
      evidence standard, and failure modes.
    - The unresolved boundary is whether the formal conditions match empirical model
      behavior in realistic settings; another recurring gap is direct validation that
      the claimed laws predict failures and transfers.
    open_questions:
    - Which representation choices remain useful when the downstream task, controller,
      or data distribution changes?
    - What shared benchmarks would let the field compare prediction quality, controllability,
      and decision utility together?
    trend_evolution: Across 2023-2026, the topic moves from isolated modeling claims
      toward work that ties clarify definitions, assumptions, laws, and boundaries
      behind world-model claims to stronger evidence and clearer boundaries.
