      use cases, Embodied and domain task transfer, Interactive agents and games,
      with a shared goal to adapt world models to domain tasks where success depends
      on task constraints, embodiment, and operating context.
    - A common pattern is to bind prediction to domain-specific state/action spaces
      and evaluate task success under realistic shifts, rather than treating paper
      titles or tags as the unit of comparison.
    disagreements:
