  related_work_outline:
  - 'Mainstream direction: Designing specialized benchmarks for world models that
    evaluate spatial consistency, memory, action control, and multi-dimensional fidelity
    across domains like driving and embodied AI.'
  - 'Shared research pattern: All benchmarks propose new datasets and metrics to probe
    specific world model capabilities (e.g., spatial consistency, action following,
    temporal coherence) and reveal trade-offs between visual quality and physical
    plausibility.'
  - 'Key differences: Domain focus (driving vs Minecraft vs general embodied), evaluation
    dimensions (single vs multi-aspect), use of human annotations vs automated metrics,
    and inclusion of baseline models.'
  - 'Trend evolution: Rapid shift from generic video generation benchmarks to domain-specific
    world model benchmarks (2024–2026), with growing emphasis on controllability,
    memory, and multi-agent consistency.'
  - 'Open questions: Whether benchmark conclusions generalize across implementations
    and compute budgets; how to ensure proxy metrics align with real-world decision
    utility; coverage of diverse real-world settings.'
  related_work_outline_zh:
  - 主流方向：设计专门的世界模型基准，评估空间一致性、记忆、动作控制及跨领域（如驾驶、具身AI）的多维保真度。
  - 研究共性：所有基准都提出新数据集和指标，探测特定世界模型能力（如空间一致性、动作跟随、时间连贯性），并揭示视觉质量与物理合理性之间的权衡。
  - 关键差异：领域焦点（驾驶 vs Minecraft vs 通用具身）、评估维度（单方面 vs 多方面）、是否使用人工标注或自动指标、是否包含基线模型。
  - 趋势演进：从通用视频生成基准快速转向领域特定的世界模型基准（2024–2026），越来越强调可控性、记忆和多智能体一致性。
  - 开放问题：基准结论在不同实现和算力预算下是否稳定；代理指标如何与真实决策效用对齐；对多样化真实场景的覆盖程度。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark task and dataset design
      what_it_solves: Creating shared tasks and datasets that make world-model claims
        comparable across different approaches.
      what_remains_open: Whether the task distribution covers the settings where world
        models are expected to help, e.g., long-horizon memory or multi-agent interaction.
    - line: Metric and stress-test design
      what_it_solves: Probing prediction, controllability, robustness, and decision
        utility beyond aggregate scores like FVD or PSNR.
      what_remains_open: Alignment between proxy metrics (e.g., SGCS, COM) and the
        downstream decisions users actually care about.
    - line: Comparable baselines and reporting
      what_it_solves: Making results auditable through common baselines, artifacts,
        and reporting conventions.
      what_remains_open: Whether benchmark conclusions remain stable across implementations,
        compute budgets, and random seeds.
    consensus:
    - Multi-dimensional evaluation is necessary; no single metric captures world model
      quality.
    - Existing models show clear trade-offs between visual realism and physical/behavioral
      consistency.
    - Controllability and memory consistency are critical but under-evaluated in earlier
      benchmarks.
    - Domain-specific benchmarks (driving, Minecraft) reveal gaps that generic video
      metrics miss.
    disagreements:
    - Whether human preference annotations are essential or automated metrics suffice
      for evaluating world models.
    - Whether benchmarks should be domain-specific (e.g., driving) or general-purpose
      (e.g., embodied AI).
    - Which evaluation dimensions (spatial vs temporal, visual vs physical) are most
      predictive of downstream task performance.
    open_questions:
    - How to design benchmarks that predict real-world downstream task performance,
      not just proxy scores?
    - What is the minimal set of evaluation dimensions needed for a comprehensive
      world model benchmark?
    - How to ensure reproducibility of benchmark results across different hardware,
      codebases, and training budgets?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准任务与数据集设计
      解决的问题: 构建共享任务和数据集，使世界模型的主张在不同方法间具有可比性。
      尚未覆盖: 任务分布是否覆盖世界模型预期发挥作用的真实设置，如长时记忆或多智能体交互。
    - 路线: 指标与压力测试设计
      解决的问题: 在FVD或PSNR等总分之外检验预测、可控性、鲁棒性和决策效用。
      尚未覆盖: 代理指标（如SGCS、COM）与用户真正关心的下游决策之间是否一致。
    - 路线: 可比基线与报告规范
      解决的问题: 通过统一基线、工件和报告规范让结果可审计。
      尚未覆盖: 基准结论在不同实现、算力预算和随机种子下是否稳定。
    共识:
    - 需要多维评估；单一指标无法捕捉世界模型质量。
    - 现有模型在视觉真实性与物理/行为一致性之间存在明显权衡。
    - 可控性和记忆一致性至关重要，但在早期基准中评估不足。
    - 领域特定基准（驾驶、Minecraft）揭示了通用视频指标遗漏的差距。
    分歧:
    - 评估世界模型时，人工偏好标注是否必不可少，还是自动指标已足够。
    - 基准应领域特定（如驾驶）还是通用（如具身AI）。
    - 哪些评估维度（空间 vs 时间、视觉 vs 物理）最能预测下游任务性能。
    开放问题:
    - 如何设计能预测真实世界下游任务性能的基准，而不仅仅是代理分数？
    - 全面世界模型基准所需的最小评估维度集是什么？
    - 如何确保基准结果在不同硬件、代码库和训练预算下的可复现性？
