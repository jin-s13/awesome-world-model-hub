  related_work_outline:
  - 'Mainstream direction: Applying world models to autonomous driving for scene prediction,
    simulation, and planning; also robotics and game agents.'
  - 'Shared research pattern: Using generative models (diffusion, autoregressive transformers)
    to learn environment dynamics conditioned on actions, enabling closed-loop simulation
    and policy evaluation.'
  - 'Key differences: Representation (discrete latent vs. diffusion vs. autoregressive
    tokens), evaluation focus (visual fidelity vs. action controllability vs. planning
    performance), and domain (driving with multi-view vs. robotics with language composition
    vs. games with real-time interaction).'
  - 'Trend evolution: From 2020-2026, shift from discrete latent world models to diffusion-based
    and autoregressive transformers; increasing emphasis on action controllability
    and real-time interaction; driving applications lead in scale and benchmark maturity.'
  - 'Open questions: Generalization across embodiments, environments, and sensor configurations;
    alignment between simulation gains and real-world safety; handling novel primitives
    or unseen combinations in compositional models.'
  related_work_outline_zh:
  - 主流方向：将世界模型应用于自动驾驶的场景预测、仿真和规划；以及机器人和游戏智能体。
  - 研究共性：使用生成模型（扩散、自回归Transformer）学习以动作为条件的环境动态，实现闭环仿真和策略评估。
  - 关键差异：表示方式（离散潜变量 vs. 扩散 vs. 自回归token）、评估焦点（视觉保真度 vs. 动作可控性 vs. 规划性能）以及领域（多视角驾驶
    vs. 语言组合机器人 vs. 实时交互游戏）。
  - 趋势演进：2020-2026年，从离散潜变量世界模型转向基于扩散和自回归Transformer的模型；越来越强调动作可控性和实时交互；驾驶应用在规模和基准成熟度上领先。
  - 开放问题：跨本体、环境和传感器配置的泛化能力；仿真收益与真实安全性之间的一致性；组合模型中处理全新原语或未见组合的能力。
  literature_review:
    line_of_work_matrix:
    - line: Embodied and domain task transfer
      what_it_solves: adapting world models to concrete task domains with domain-specific
        states, actions, and constraints
      what_remains_open: whether improvements transfer across embodiments, datasets,
        institutions, or physical environments
    - line: Autonomous driving and simulation use cases
      what_it_solves: using world models for scene prediction, closed-loop simulation,
        and policy evaluation in driving
      what_remains_open: alignment between simulator gains and real-world safety or
        operational outcomes
    - line: Interactive agents and games
      what_it_solves: grounding world models in interactive environments where agents
        must act over time
      what_remains_open: generalization when environment rules, goals, or user interactions
        change
    consensus:
    - World models benefit from generative architectures that model dynamics conditioned
      on actions.
    - Visual fidelity in world models correlates with improved downstream agent performance.
    - Closed-loop simulation is a key evaluation paradigm for assessing world model
      utility.
    disagreements:
    - Whether discrete latent representations or continuous diffusion/autoregressive
      models are better for long-horizon consistency.
    - Whether action controllability should be evaluated separately from visual quality
      or as an integrated metric.
    - Whether real-time interaction is necessary for all application domains or only
      for games and robotics.
    open_questions:
    - Can driving world models trained on nuScenes generalize to other sensor configurations
      or geographic regions?
    - How to ensure compositional world models handle entirely novel primitives not
      seen during training?
    - What metrics best capture safety-critical failures in simulation before real-world
      deployment?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 具身与领域任务迁移
      解决的问题: 把世界模型适配到具有领域状态、动作和约束的具体任务
      尚未覆盖: 改进能否跨本体、数据集、机构或物理环境迁移
    - 路线: 自动驾驶与仿真应用
      解决的问题: 将世界模型用于驾驶中的场景预测、闭环仿真和策略评测
      尚未覆盖: 仿真收益与真实安全或运营结果之间是否一致
    - 路线: 交互式智能体与游戏
      解决的问题: 把世界模型落到智能体需要持续行动的交互环境中
      尚未覆盖: 环境规则、目标或用户交互变化时的泛化能力
    共识:
    - 世界模型受益于以动作为条件建模动态的生成架构。
    - 世界模型中的视觉保真度与下游智能体性能提升相关。
    - 闭环仿真是评估世界模型实用性的关键范式。
    分歧:
    - 离散潜变量表示与连续扩散/自回归模型在长时域一致性上孰优孰劣。
    - 动作可控性应单独评估还是与视觉质量整合为统一指标。
    - 实时交互是否对所有应用领域必要，还是仅适用于游戏和机器人。
    开放问题:
    - 在nuScenes上训练的驾驶世界模型能否泛化到其他传感器配置或地理区域？
    - 如何确保组合世界模型能处理训练中未见过的全新原语？
    - 哪些指标能最好地捕捉仿真中的安全关键故障，以便在真实部署前预警？
