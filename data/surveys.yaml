  literature_review:
    line_of_work_matrix:
    - line: Taxonomy and roadmap synthesis
      what_it_solves: Organizing fragmented world model research into coherent design
        spaces (e.g., latent representations, modalities, evaluation levels) to clarify
        progress and gaps.
      what_remains_open: Whether taxonomies are empirically validated or rely on selective
        examples; coverage of rapidly emerging methods may be incomplete.
    - line: Comparative evaluation synthesis
      what_it_solves: Summarizing how different evaluation choices (e.g., visual metrics
        vs. decision utility) shape conclusions across world model papers.
      what_remains_open: Compatibility of compared results across different settings
        (e.g., open-loop vs. closed-loop) is often unverified.
    - line: Open problem and gap mapping
      what_it_solves: Translating broad literature coverage into concrete next research
        questions, such as causality, long-term memory, and real-time interaction.
      what_remains_open: Prioritization of which gaps matter most for progress remains
