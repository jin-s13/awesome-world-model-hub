  related_work_outline_zh:
  - 主流方向：世界模型综述正汇聚于以决策为中心的评估和分类法驱动的组织方式，聚焦于连接视频生成与具身AI。
  - 研究共性：提出结构化分类法（如按表示、模态或评估层级）并系统性地映射开放挑战和未来方向。
  - 关键差异：范围从通用世界模型到特定领域（自动驾驶、3D/4D）；部分强调评估框架，部分批判现有方法；表示选择（潜在 vs. 像素）和评估焦点（视觉保真度 vs.
