  related_work_outline:
  - 'Mainstream direction: Formalizing world models through taxonomies, consistency
    principles, and sufficiency constraints to define necessary properties beyond
    passive prediction.'
  - 'Shared research pattern: Emphasis on latent state design, scaling behaviors,
    and evaluation frameworks that prioritize functional benchmarks over visual fidelity.'
  - 'Key differences: Representation (explicit vs implicit state construction), supervision
    signal (dynamics prediction vs equivariance vs generative loss), and evaluation
    target (zero-shot generalization vs scaling laws vs consistency).'
  - 'Trend evolution: From 2024 to 2026, the field moves from isolated scaling studies
    and taxonomy proposals toward unified principles (e.g., Trinity of Consistency)
    and functional evaluation, though empirical validation remains narrow.'
  - 'Open questions: Whether formal conditions match empirical model behavior; how
    to operationalize sufficiency constraints; transferability of scaling laws across
    environments; scalability of structured world models.'
  related_work_outline_zh:
  - 主流方向：通过分类法、一致性原则和充分性约束形式化世界模型，定义超越被动预测的必要属性。
  - 研究共性：强调潜在状态设计、缩放行为以及优先考虑功能基准而非视觉保真度的评估框架。
  - 关键差异：表示方式（显式与隐式状态构建）、监督信号（动力学预测 vs 等变性 vs 生成损失）以及评估目标（零样本泛化 vs 缩放规律 vs 一致性）。
  - 趋势演进：从2024到2026年，领域从孤立的缩放研究和分类法提案转向统一原则（如一致性三位一体）和功能评估，但实证验证仍狭窄。
  - 开放问题：形式条件是否符合经验模型行为；如何操作化充分性约束；缩放规律跨环境的可迁移性；结构化世界模型的可扩展性。
  literature_review:
    line_of_work_matrix:
    - line: Formal definitions and assumptions for world models
      what_it_solves: Clarifying necessary properties (state construction, dynamics
        modeling, consistency) and assumptions under which world models can be considered
        general or actionable.
      what_remains_open: Whether formal conditions match empirical model behavior
        in realistic settings; lack of unified evaluation to test these conditions.
    - line: Scaling laws and guarantees for world models
      what_it_solves: Connecting model scale, data, and objectives to predictive and
        control performance, revealing distinct scaling regimes across tasks.
      what_remains_open: Direct validation that scaling laws predict failures and
        transfer across diverse environments; limited to Atari and small-scale settings.
    - line: Conceptual taxonomy and boundaries
      what_it_solves: Organizing fragmented world-model claims into categories (e.g.,
        levels, laws, sufficiency constraints) to expose hidden gaps and guide design.
      what_remains_open: Whether taxonomies change how researchers evaluate or design
        models; need for operationalization and quantitative benchmarks.
    consensus:
    - World models must go beyond passive prediction to support control and generalization;
      current evaluation metrics (visual fidelity) are insufficient.
    - Latent state design is crucial and should be task-specific rather than maximizing
      information preservation.
    - Scaling can improve performance but not uniformly across tasks; joint training
      across environments stabilizes scaling dynamics.
    disagreements:
    - 'Representation: explicit state construction (object-centric, structured) vs
      implicit context management (latent compression).'
    - 'Supervision signal: self-supervised dynamics prediction vs equivariance constraints
      vs generative objectives (e.g., video prediction).'
    - 'Evaluation target: zero-shot generalization across symmetries vs scaling law
      characterization vs consistency across modalities/spacetime.'
    - 'Deployment setting: Atari benchmarks vs real-world robotics vs multi-modal
      video generation; limited cross-setting validation.'
    open_questions:
    - Can formal consistency principles (modal, spatial, temporal) be empirically
      verified in current world models?
    - Do scaling laws observed on Atari transfer to more complex environments with
      higher-dimensional observations?
    - How to operationalize sufficiency constraints for latent state design in a quantitative,
      task-agnostic manner?
    - Can exact equivariance be maintained at scale without sacrificing model capacity
      or data efficiency?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 世界模型的形式化定义与假设
      解决的问题: 澄清必要属性（状态构建、动态建模、一致性）以及世界模型可被视为通用或可操作的假设条件。
      尚未覆盖: 形式条件是否符合真实场景中的经验模型行为；缺乏统一的评估来检验这些条件。
    - 路线: 世界模型的缩放规律与保证
      解决的问题: 将模型规模、数据和目标与预测及控制性能联系起来，揭示不同任务间的不同缩放机制。
      尚未覆盖: 缩放规律能否预测失败和迁移的直接验证；目前仅限于Atari和小规模设置。
    - 路线: 概念分类与边界
      解决的问题: 将碎片化的世界模型主张组织成类别（如层级、法则、充分性约束），以暴露隐藏的差距并指导设计。
      尚未覆盖: 这些分类是否真正改变研究者的评测和模型设计方式；需要操作化和定量基准。
    共识:
    - 世界模型必须超越被动预测以支持控制和泛化；当前评估指标（视觉保真度）不足。
    - 潜在状态设计至关重要，应针对任务而非最大化信息保留。
    - 缩放可以提升性能，但并非所有任务都一致；多环境联合训练稳定了缩放动态。
    分歧:
    - 表示方式：显式状态构建（对象中心、结构化） vs 隐式上下文管理（潜在压缩）。
    - 监督信号：自监督动力学预测 vs 等变性约束 vs 生成目标（如视频预测）。
    - 评估目标：跨对称群的零样本泛化 vs 缩放规律表征 vs 跨模态/时空的一致性。
    - 部署场景：Atari基准 vs 真实机器人 vs 多模态视频生成；跨场景验证有限。
    开放问题:
    - 一致性原则（模态、空间、时间）能否在当前世界模型中得到经验验证？
    - 在Atari上观察到的缩放规律能否迁移到具有更高维观测的复杂环境？
    - 如何以定量、任务无关的方式操作化潜在状态设计的充分性约束？
    - 精确等变性能否在不牺牲模型容量或数据效率的情况下保持大规模？
