  - 关键差异：论文之间的差异主要体现在CV、AI、world models、RO、world model，因此更值得比较表示方式、监督信号和决策时接口。
  - 趋势演进：从 2018 到 2026，研究重心正在从单点模型主张转向可交互系统、标准化基准和可横向比较的证据。
  - 开放问题：反复出现的缺口包括该方法假设上下文值可观测，这在许多真实场景中可能不成立。、泛化仅限于训练中见过的原语组合；全新原语可能无法支持，这些应成为后续文献综述的主线。
