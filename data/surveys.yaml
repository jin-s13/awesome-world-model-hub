  related_work_outline:
  - 'Mainstream direction: Real-time interactive world models as runnable systems
    for simulation and closed-loop control.'
  - 'Shared research pattern: Open-source release, autoregressive or diffusion-based
    video generation, action-conditioned generation, focus on latency and interactivity.'
  - 'Key differences: Application domain (gaming, driving, robotics), architecture
    (transformer vs diffusion, full vs few-step), evaluation focus (fidelity vs speed
    vs action control).'
  - 'Trend evolution: Shift from offline video generation to real-time interactive
    systems; increasing emphasis on open-source benchmarks and reproducibility.'
  - 'Open questions: How to balance speed, fidelity, and controllability; generalization
    from synthetic to real; long-term temporal consistency; standardized evaluation
    for interactive world models.'
  related_work_outline_zh:
  - 主流方向：实时交互式世界模型作为可运行系统，用于模拟和闭环控制。
  - 研究共性：开源发布、自回归或扩散视频生成、动作条件生成、关注延迟和交互性。
  - 关键差异：应用领域（游戏、驾驶、机器人）、架构（Transformer vs 扩散、全步 vs 少步）、评估重点（保真度 vs 速度 vs 动作控制）。
  - 趋势演进：从离线视频生成转向实时交互系统；开源基准和可复现性日益重要。
  - 开放问题：如何平衡速度、保真度和可控性；从合成到真实的泛化；长期时间一致性；交互式世界模型的标准化评估。
  literature_review:
    line_of_work_matrix:
    - line: Runnable pipelines and deployment stacks
      what_it_solves: Turning world model ideas into end-to-end workflows for data,
        training, inference, and evaluation (e.g., Terra ACT-Bench, FAR-Drive).
      what_remains_open: How well the stack survives external deployment, hardware
        changes, and user-specific settings.
    - line: Real-time and interactive serving
      what_it_solves: Meeting latency and interactivity requirements for closed-loop
        use (e.g., MineWorld, Matrix-Game 2.0, Yume).
      what_remains_open: Trade-offs between speed, fidelity, controllability, and
        system complexity.
    - line: Artifacts and reproducible engineering
      what_it_solves: Making systems inspectable and reusable through code, tools,
        and experiment artifacts (e.g., open-source releases of LingBot-World, KeyWorld).
      what_remains_open: Independent reproduction across teams, datasets, and infrastructure
        environments.
    consensus:
    - World models are increasingly released as open-source systems with code and
      pretrained weights.
    - Real-time interaction (sub-second latency) is a primary design goal for interactive
      world models.
    - Autoregressive and diffusion-based architectures are both used, with trade-offs
      in speed and quality.
    - Evaluation often combines visual fidelity metrics with action-following or controllability
      metrics.
    disagreements:
    - Whether autoregressive transformers or diffusion models offer better speed-quality
      trade-offs for interactive generation.
    - Whether synthetic data (e.g., Unreal Engine, Minecraft) is sufficient for generalization
      to real-world scenes.
    - Whether frame-level autoregressive generation or key-frame reasoning is more
      efficient for long-horizon prediction.
    - Whether evaluation should prioritize action fidelity (e.g., ACT-Bench) or visual
      quality (e.g., FVD).
    open_questions:
    - How do current world models generalize to unseen environments beyond their training
      domains (e.g., from Minecraft to real-world robotics)?
    - What is the minimal latency required for effective closed-loop control in autonomous
      driving, and do current systems meet it?
    - Can few-step distillation maintain sufficient quality for long-term interactive
      use?
    - How to standardize evaluation of interactive world models across different domains
      and interaction modalities?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 可运行流水线与部署栈
      解决的问题: 将世界模型想法转化为覆盖数据、训练、推理和评测的端到端工作流（例如 Terra ACT-Bench、FAR-Drive）。
      尚未覆盖: 系统栈在外部部署、硬件变化和用户特定设置下是否仍然可靠。
    - 路线: 实时与交互式服务
      解决的问题: 满足闭环使用中的延迟和交互需求（例如 MineWorld、Matrix-Game 2.0、Yume）。
      尚未覆盖: 速度、保真度、可控性和系统复杂度之间的权衡。
    - 路线: 工件与可复现工程
      解决的问题: 通过代码、工具和实验工件让系统可检查、可复用（例如 LingBot-World、KeyWorld 的开源发布）。
      尚未覆盖: 跨团队、数据集和基础设施环境的独立复现。
    共识:
    - 世界模型越来越多地作为开源系统发布，附带代码和预训练权重。
    - 实时交互（亚秒级延迟）是交互式世界模型的主要设计目标。
    - 自回归和扩散架构都被使用，在速度和质量之间存在权衡。
    - 评估通常结合视觉保真度指标与动作跟随或可控性指标。
    分歧:
    - 自回归Transformer与扩散模型在交互式生成中哪个提供更好的速度-质量权衡。
    - 合成数据（如Unreal Engine、Minecraft）是否足以泛化到真实场景。
    - 帧级自回归生成与关键帧推理哪个对长时域预测更高效。
    - 评估应优先考虑动作忠实度（如ACT-Bench）还是视觉质量（如FVD）。
    开放问题:
    - 当前世界模型如何泛化到训练领域之外的未见环境（例如从Minecraft到真实机器人）？
    - 自动驾驶中有效闭环控制所需的最小延迟是多少，当前系统是否满足？
    - 少步蒸馏能否在长期交互使用中保持足够质量？
    - 如何标准化跨不同领域和交互模态的交互式世界模型评估？
