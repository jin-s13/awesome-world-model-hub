  related_work_outline:
  - 'Mainstream direction: Applying world models to embodied domains—robotics, autonomous
    driving, and interactive games—for planning, simulation, and policy learning.'
  - 'Shared research pattern: Using learned dynamics (latent or video-based) to enable
    agents to imagine outcomes, with action conditioning and multi-step prediction
    as common design elements.'
  - 'Key differences: Representation (diffusion vs autoregressive), supervision (language,
    action, or reward), evaluation (simulation vs real-world), and deployment (online
    learning vs offline dataset training).'
  - 'Trend evolution: From early Dreamer-based online robot learning (2022) to diffusion-based
    driving world models and real-time game engines (2024–2026), with growing emphasis
    on action controllability and closed-loop simulation.'
  - 'Open questions: Generalization across embodiments and environments; alignment
    between simulation gains and real-world safety; handling novel tasks or primitives
    not seen during training.'
  related_work_outline_zh:
  - 主流方向：将世界模型应用于具身领域——机器人、自动驾驶和交互式游戏——用于规划、模拟和策略学习。
  - 研究共性：利用学习到的动力学（潜变量或视频形式）使智能体能够想象结果，动作条件化和多步预测是常见设计元素。
  - 关键差异：表示方式（扩散 vs 自回归）、监督信号（语言、动作或奖励）、评估方式（模拟 vs 真实世界）以及部署方式（在线学习 vs 离线数据集训练）。
  - 趋势演进：从早期基于Dreamer的物理机器人在线学习（2022）到基于扩散的驾驶世界模型和实时游戏引擎（2024–2026），越来越强调动作可控性和闭环模拟。
  - 开放问题：跨本体和环境的泛化能力；模拟收益与真实安全性之间的一致性；处理训练中未见的新任务或原语。
  literature_review:
    line_of_work_matrix:
    - line: Embodied and domain task transfer
      what_it_solves: Adapting world models to concrete task domains with domain-specific
        states, actions, and constraints (e.g., DayDreamer on physical robots, RoboDreamer
        for language-conditioned manipulation).
      what_remains_open: Whether improvements transfer across embodiments, datasets,
        institutions, or physical environments; generalization to unseen task combinations.
    - line: Autonomous driving and simulation use cases
      what_it_solves: Using world models for scene prediction, closed-loop simulation,
        and policy evaluation in driving (e.g., MaskGWM, Drive-WM, FAR-Drive, Terra
        ACT-Bench).
      what_remains_open: Alignment between simulator gains and real-world safety or
        operational outcomes; long-horizon consistency and cross-view geometric fidelity.
    - line: Interactive agents and games
      what_it_solves: Grounding world models in interactive environments where agents
        must act over time (e.g., DIAMOND in Atari, MineWorld in Minecraft).
      what_remains_open: Generalization when environment rules, goals, or user interactions
        change; real-time inference with high visual quality.
    consensus:
    - World models are increasingly used for planning and simulation in embodied domains,
      replacing or augmenting traditional simulators.
    - Video generation serves as a common interface for world model predictions, enabling
      visual feedback for policy evaluation.
    - Action conditioning is essential for controllability; models must generate futures
      that depend on agent actions.
    - Both diffusion-based and autoregressive architectures are viable, with trade-offs
      in visual fidelity, speed, and long-horizon consistency.
    disagreements:
    - Diffusion models (e.g., DIAMOND) emphasize visual detail and achieve high agent
      performance, while autoregressive models (e.g., MineWorld) prioritize real-time
      speed and parallel decoding.
    - Some works train world models online on real robots (DayDreamer), others use
      offline datasets (MaskGWM, FAR-Drive), leading to different assumptions about
      data availability and sim-to-real transfer.
    - 'Evaluation metrics vary: human normalized score for games, action fidelity
      for driving, task success for robotics—making cross-domain comparison difficult.'
    - 'Representation choice: discrete latent variables (Dreamer family) vs. continuous
      diffusion vs. tokenized autoregressive—each affects training stability and sample
      efficiency.'
    open_questions:
    - How can world models generalize to unseen tasks, environments, or embodiments
      without retraining from scratch?
    - What evaluation protocols best predict real-world safety and robustness for
      driving world models?
    - Can a single world model architecture serve multiple domains (robotics, driving,
      games) with minimal domain-specific tuning?
    - How to achieve real-time interaction with diffusion-based world models without
      sacrificing visual quality?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 具身与领域任务迁移
      解决的问题: 把世界模型适配到具有领域状态、动作和约束的具体任务（例如DayDreamer在物理机器人上，RoboDreamer用于语言条件操作）。
      尚未覆盖: 改进能否跨本体、数据集、机构或物理环境迁移；对未见任务组合的泛化能力。
    - 路线: 自动驾驶与仿真应用
      解决的问题: 将世界模型用于驾驶中的场景预测、闭环仿真和策略评测（例如MaskGWM、Drive-WM、FAR-Drive、Terra ACT-Bench）。
      尚未覆盖: 仿真收益与真实安全或运营结果之间是否一致；长时域一致性和跨视图几何保真度。
    - 路线: 交互式智能体与游戏
      解决的问题: 把世界模型落到智能体需要持续行动的交互环境中（例如DIAMOND在Atari中，MineWorld在Minecraft中）。
      尚未覆盖: 环境规则、目标或用户交互变化时的泛化能力；实时推理与高视觉质量的平衡。
    共识:
    - 世界模型越来越多地用于具身领域的规划和模拟，替代或增强传统模拟器。
    - 视频生成作为世界模型预测的通用接口，为策略评估提供视觉反馈。
    - 动作条件化对于可控性至关重要；模型必须生成依赖于智能体动作的未来。
    - 扩散和自回归架构各有优劣，在视觉保真度、速度和长时域一致性之间存在权衡。
    分歧:
    - 扩散模型（如DIAMOND）强调视觉细节并实现高智能体性能，而自回归模型（如MineWorld）优先考虑实时速度和并行解码。
    - 一些工作在真实机器人上在线训练世界模型（DayDreamer），另一些使用离线数据集（MaskGWM、FAR-Drive），导致对数据可用性和模拟到真实迁移的不同假设。
    - 评估指标各异：游戏使用人类归一化得分，驾驶使用动作忠实度，机器人使用任务成功率——使得跨领域比较困难。
    - 表示方式选择：离散潜变量（Dreamer系列） vs. 连续扩散 vs. 分词自回归——影响训练稳定性和样本效率。
    开放问题:
    - 世界模型如何泛化到未见任务、环境或本体，而无需从头重新训练？
    - 哪些评估协议最能预测驾驶世界模型的真实安全性和鲁棒性？
    - 单一世界模型架构能否在最少领域特定调整下服务于多个领域（机器人、驾驶、游戏）？
    - 如何在不牺牲视觉质量的情况下实现基于扩散的世界模型的实时交互？
