    - The main body of work is organized around Benchmark task and dataset design,
      Comparable baselines and reporting, Metric and stress-test design, with a shared
      goal to make world-model claims comparable through shared tasks, metrics, baselines,
      and reporting rules.
    - A common pattern is to define a task distribution, choose measurable failure
      modes, and expose where proxy scores diverge from useful behavior, rather than
      treating paper titles or tags as the unit of comparison.
    disagreements:
    - The substantive split is between dataset coverage, metric design, stress tests,
      and baseline comparability; those choices change the input-output contract,
      evidence standard, and failure modes.
    - The unresolved boundary is whether the task distribution covers the settings
      where world models are expected to help; another recurring gap is whether benchmark
      conclusions remain stable across implementations and compute budgets.
    open_questions:
    - Which representation choices remain useful when the downstream task, controller,
      or data distribution changes?
    - Do current evaluation protocols measure decision utility directly, or mostly
      proxy quality signals?
    trend_evolution: Across 2021-2026, the topic moves from isolated modeling claims
      toward work that ties make world-model claims comparable through shared tasks,
      metrics, baselines, and reporting rules to stronger evidence and clearer boundaries.
