      other domains with different action spaces and evidence standards; those choices
      change the input-output contract, evidence standard, and failure modes.
    - The unresolved boundary is alignment between simulator gains and real-world
      safety or operational outcomes; another recurring gap is whether improvements
      transfer across embodiments, datasets, institutions, or physical environments.
    open_questions:
    - Which representation choices remain useful when the downstream task, controller,
      or data distribution changes?
    - What shared benchmarks would let the field compare prediction quality, controllability,
      and decision utility together?
