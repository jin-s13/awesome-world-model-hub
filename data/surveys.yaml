    title: A Comprehensive Survey on World Models for Embodied AI
    year: 2025
    score: 78.4
    url: https://arxiv.org/abs/2510.16732
  related_work_outline:
  - 'Mainstream direction: Designing world model architectures that integrate generative
    (diffusion/VAE) and sequence modeling (Transformer) with task-specific conditioning
    (context, language, physics) for embodied AI and RL.'
  - 'Shared research pattern: Use of diffusion transformers or VAE-Transformer hybrids;
    conditioning on actions, context, or language; evaluation on video prediction
    and downstream task performance.'
  - 'Key differences: Representation space (pixel vs. dense features vs. latent),
    conditioning mechanism (context vs. language vs. physics), and whether the model
    is used for planning or just prediction.'
  - 'Trend evolution: From early RSSM-based models (Dreamer) to diffusion-based architectures;
    increasing use of pretrained visual features (DINOv2) and physics priors; shift
    towards unified models that couple video and action generation.'
  - 'Open questions: How to isolate method contribution from system choices; generalization
    beyond seen tasks; real-time efficiency; physical consistency metrics.'
  related_work_outline_zh:
  - 主流方向：设计融合生成模型（扩散/VAE）与序列建模（Transformer）的世界模型架构，并结合任务特定条件（上下文、语言、物理）用于具身AI和强化学习。
  - 研究共性：采用扩散Transformer或VAE-Transformer混合结构；以动作、上下文或语言为条件；在视频预测和下游任务性能上评估。
  - 关键差异：表示空间（像素 vs. 密集特征 vs. 潜在空间）、条件机制（上下文 vs. 语言 vs. 物理）、以及模型用于规划还是仅用于预测。
  - 趋势演进：从早期基于RSSM的模型（Dreamer）转向扩散架构；越来越多使用预训练视觉特征（DINOv2）和物理先验；向耦合视频与动作生成的统一模型发展。
  - 开放问题：如何隔离方法贡献与系统选择；超越已见任务的泛化；实时效率；物理一致性指标。
  literature_review:
    line_of_work_matrix:
    - line: Method representation and objective design
      what_it_solves: Turning world-model ideas into concrete representations, losses,
        architectures, and training recipes
      what_remains_open: Which algorithmic choices transfer beyond the reported task
        family and objective design
    - line: Planning and action-interface methods
      what_it_solves: Connecting learned dynamics to intervention, planning, and decision-time
        interfaces
      what_remains_open: How much of the gain comes from the model versus the planner,
        controller, or task prior
    - line: Method evidence and ablation protocol
      what_it_solves: Separating method contribution from dataset, baseline, metric,
        and implementation effects
      what_remains_open: Whether evidence isolates the proposed method rather than
        surrounding system choices
    consensus:
    - Diffusion-based architectures (e.g., DiT, conditional diffusion) are becoming
      dominant for world model video prediction.
    - Conditioning on actions, context, or language improves generalization and task-specific
      generation.
    - Evaluation typically combines pixel-level metrics (FID, PSNR) with downstream
      task performance (RL reward, planning success).
    disagreements:
    - 'Representation space: pixel-level vs. dense feature space (e.g., DINOv2) vs.
      latent VAE space.'
    - 'Conditioning approach: explicit context values vs. language decomposition vs.
      physics priors.'
    - Whether world model should be used for planning (Dreamer-style) or as a video
      generator for policy pretraining.
    open_questions:
    - How to design evaluation metrics that capture physical consistency rather than
      pixel fidelity?
    - Can world models generalize to entirely novel tasks or dynamics without retraining?
    - What is the minimal amount of interaction data needed to learn a useful world
      model?
    - How to achieve real-time inference for closed-loop control?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 方法表示与目标设计
      解决的问题: 把世界模型想法落实为具体表示、损失函数、架构和训练配方
      尚未覆盖: 哪些算法选择能迁移到报告任务族和目标设计之外
    - 路线: 规划与动作接口方法
      解决的问题: 把学习到的动力学连接到干预、规划和决策时接口
      尚未覆盖: 收益有多少来自模型本身，而不是规划器、控制器或任务先验
    - 路线: 方法证据与消融协议
      解决的问题: 区分方法贡献与数据集、基线、指标和实现因素
      尚未覆盖: 证据是否真正隔离了方法贡献，而不是周边系统选择
    共识:
    - 基于扩散的架构（如DiT、条件扩散）正成为世界模型视频预测的主流。
    - 以动作、上下文或语言为条件能提升泛化性和任务特定生成。
    - 评估通常结合像素级指标（FID、PSNR）与下游任务性能（RL奖励、规划成功率）。
    分歧:
    - 表示空间：像素级 vs. 密集特征空间（如DINOv2） vs. 潜在VAE空间。
    - 条件机制：显式上下文值 vs. 语言分解 vs. 物理先验。
    - 世界模型应用于规划（Dreamer风格）还是作为策略预训练的视频生成器。
    开放问题:
    - 如何设计评估物理一致性而非像素保真度的指标？
    - 世界模型能否无需重新训练就泛化到全新任务或动力学？
    - 学习有用世界模型所需的最少交互数据量是多少？
    - 如何实现闭环控制的实时推理？
