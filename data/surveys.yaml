  - 研究共性：高分论文通常把RoboDreamer通过将语言指令解析为一组低级原语来学习组合世界模型，每个原语对应一个独立的视频生成模型。推理时，新指令被分解为先前见过的原语，相应模型组合生成视频计划。该方法还支持额外目标图像作为多模态…、本综述对具身智能中的世界模型进行了全面的文献回顾，形式化了问题和学习目标。它构建了一个三轴分类法来对现有方法进行分类，系统整理了可用的数据集和评估指标，并对最先进模型进行了定量比较，以识别趋势和差距。、本文对交互式世界建模的最新研究趋势、技术进展、评估基准及未来方向进行了系统综述。按应用场景、世界状态演化及场景模态分类，深入探讨三大技术挑战，并比较四个具体应用领域的现有基准与指标。与该方法成功合成RT-X数据集中未见目标的视频计划，在仿真中实现成功的机器人执行，并显著优于单一基线视频生成方法。、该综述提供了对最先进世界模型的定量比较，并提炼了关键开放挑战，包括统一数据集的稀缺性、需要评估物理一致性而非像素保真度的指标、模型性能与实时计算效率之间的权衡，以及在缓解误差累积的同时实现长时域一致性的困难。、本文提供了交互式世界建模的全面综述，总结了当前趋势与挑战，并比较了开放世界探索、游戏引擎、自动驾驶和机器人领域的基准。未呈现新的实验结果。结合起来，而不是只停留在概念声明。
  - 关键差异：论文之间的差异主要体现在AI、world models、CV、LG、RO，因此更值得比较表示方式、监督信号和决策时接口。
  - 趋势演进：从 2022 到 2026，研究重心正在从单点模型主张转向可交互系统、标准化基准和可横向比较的证据。
  - 开放问题：反复出现的缺口包括泛化仅限于训练中见过的原语组合；全新原语可能无法支持、用于训练和评估的统一数据集稀缺。、由于该领域发展迅速，综述可能未涵盖所有最新工作，这些应成为后续文献综述的主线。
