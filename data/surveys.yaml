    consensus:
    - The main body of work is organized around Embodied and domain task transfer,
      Interactive agents and games, Autonomous driving and simulation use cases, with
      a shared goal to adapt world models to domain tasks where success depends on
      task constraints, embodiment, and operating context.
    - A common pattern is to bind prediction to domain-specific state/action spaces
      and evaluate task success under realistic shifts, rather than treating paper
      titles or tags as the unit of comparison.
    disagreements:
    - The substantive split is between robotics, driving, interactive agents, and
      other domains with different action spaces and evidence standards; those choices
      change the input-output contract, evidence standard, and failure modes.
    - The unresolved boundary is whether improvements transfer across embodiments,
      datasets, institutions, or physical environments; another recurring gap is generalization
      when environment rules, goals, or user interactions change.
    open_questions:
    - Which representation choices remain useful when the downstream task, controller,
      or data distribution changes?
    - What shared benchmarks would let the field compare prediction quality, controllability,
      and decision utility together?
    trend_evolution: Across 2018-2026, the topic moves from isolated modeling claims
      toward work that ties adapt world models to domain tasks where success depends
      on task constraints, embodiment, and operating context to stronger evidence
      and clearer boundaries.
