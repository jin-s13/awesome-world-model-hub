    - 路线: 开放问题与缺口映射
      解决的问题: 将广泛文献覆盖转化为具体下一步研究问题，如因果性、长期记忆和实时交互。
      尚未覆盖: 哪些缺口对进展最重要仍依赖主观判断和领域依赖。
    共识:
    - 世界模型对于合成逼真的视觉内容和在动态环境中实现智能决策至关重要。
    - 当前评估指标过度强调视觉保真度，低估了物理持久性、因果推理和策略效用。
    - 关键挑战包括动作条件可控性、长时交互和实时响应。
    - 广泛倡导转向测试反事实推理和规划的功能性基准。
    分歧:
    - 表示选择：潜在空间模型（如自动驾驶潜在世界模型） vs. 像素级视频生成作为世界模型。
