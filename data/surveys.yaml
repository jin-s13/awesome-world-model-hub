  related_work_outline:
  - 'Mainstream direction: Applying world models to domain-specific tasks—autonomous
    driving, robotics, and games—for action-conditional video prediction, planning,
    and policy learning.'
  - 'Shared research pattern: Using generative models (diffusion, autoregressive,
    or latent dynamics) to simulate future states conditioned on actions, then leveraging
    the model for trajectory selection or agent training.'
  - 'Key differences: Representation (discrete latent vs. diffusion vs. autoregressive),
    supervision (sparse rewards, language, trajectory data), evaluation target (agent
    performance, video quality, action fidelity), and deployment (real robot vs. simulation).'
  - 'Trend evolution: Shift from latent dynamics (Dreamer) to diffusion-based world
    models (DIAMOND, MaskGWM) and autoregressive transformers (MineWorld, FAR-Drive);
    growing emphasis on real-time interaction, closed-loop simulation, and action
    controllability.'
  - 'Open questions: Generalization across embodiments, environments, and tasks; alignment
    between simulation gains and real-world outcomes; long-horizon consistency; action
    fidelity in driving models; real-time performance at scale.'
  related_work_outline_zh:
  - 主流方向：将世界模型应用于特定领域任务——自动驾驶、机器人和游戏——用于动作条件视频预测、规划和策略学习。
  - 研究共性：使用生成模型（扩散、自回归或潜变量动力学）模拟以动作为条件的未来状态，然后利用模型进行轨迹选择或智能体训练。
  - 关键差异：表示方式（离散潜变量 vs. 扩散 vs. 自回归）、监督信号（稀疏奖励、语言指令、轨迹数据）、评测目标（智能体性能、视频质量、动作忠实度）以及部署场景（真实机器人
    vs. 仿真）。
  - 趋势演进：从潜变量动力学（Dreamer）转向基于扩散的世界模型（DIAMOND, MaskGWM）和自回归Transformer（MineWorld, FAR-Drive）；越来越强调实时交互、闭环仿真和动作可控性。
  - 开放问题：跨本体、环境和任务的泛化能力；仿真收益与真实世界结果之间的一致性；长时域一致性；驾驶模型中的动作忠实度；大规模实时性能。
  literature_review:
    line_of_work_matrix:
    - line: Embodied and domain task transfer
      what_it_solves: Adapting world models to physical robots for online learning
        without simulators, and enabling compositional generalization from language
        instructions.
      what_remains_open: Generalization across embodiments, tasks, and environments;
        reliance on specific robot platforms; simulation-to-real gap not fully addressed;
        evaluation mostly in simulation.
    - line: Autonomous driving and simulation use cases
      what_it_solves: Scene prediction, closed-loop simulation, action-conditional
        video generation, and safe planning via multiple future trajectory selection.
      what_remains_open: Alignment between simulation gains and real-world safety;
        generalization across datasets and sensor configurations; long-horizon consistency;
        action fidelity (current models do not fully adhere to given actions).
    - line: Interactive agents and games
      what_it_solves: Grounding world models in interactive environments (Atari, Minecraft)
        for agent training and real-time interaction, with improved visual details
        boosting agent performance.
      what_remains_open: Generalization when environment rules or goals change; trade-offs
        between real-time performance and visual quality; diffusion vs. autoregressive
        architecture choices.
    consensus:
    - World models can serve as differentiable simulators for planning or policy learning
      within the model, reducing reliance on real-world interaction.
    - Action conditioning is essential for controllable generation and downstream
      task performance.
    - Visual fidelity in generated frames correlates with agent performance in interactive
      domains.
    - Standard benchmarks (nuScenes, Atari 100k) are widely used for evaluation, enabling
      cross-method comparison.
    disagreements:
    - 'Representation: discrete latent variables (Dreamer) vs. diffusion-based pixel
      generation (DIAMOND, MaskGWM) vs. autoregressive token prediction (MineWorld,
      FAR-Drive).'
    - 'Supervision: sparse rewards (DayDreamer) vs. language instructions (RoboDreamer)
      vs. trajectory data (Terra, FAR-Drive).'
    - 'Evaluation target: agent performance (DIAMOND) vs. video quality and consistency
      (MaskGWM) vs. action fidelity (Terra ACT-Bench).'
    - 'Interaction mode: open-loop prediction vs. closed-loop autoregressive generation
      with feedback.'
    - 'Deployment setting: real-world physical robots (DayDreamer) vs. simulation-only
      (RoboDreamer, DIAMOND, driving models).'
    open_questions:
    - How well do improvements in simulation transfer to real-world safety and operational
      outcomes for autonomous driving?
    - Can world models generalize across different robot embodiments, tasks, and physical
      environments without retraining?
    - What is the optimal trade-off between visual detail and computational efficiency
      for real-time interactive world models?
    - How can action fidelity be guaranteed in driving world models, especially under
      distribution-shifted conditions?
    - Do autoregressive world models scale to longer horizons without degradation,
      and can they match diffusion models in visual quality?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 具身与领域任务迁移
      解决的问题: 将世界模型适配到物理机器人，实现无需模拟器的在线学习，并通过语言指令实现组合泛化。
      尚未覆盖: 跨本体、任务和环境的泛化能力；对特定机器人平台的依赖；仿真到真实的差距未完全解决；评估多在仿真中进行。
    - 路线: 自动驾驶与仿真应用
      解决的问题: 场景预测、闭环仿真、动作条件视频生成，以及通过多未来轨迹选择实现安全规划。
      尚未覆盖: 仿真收益与真实安全性之间的一致性；跨数据集和传感器配置的泛化；长时域一致性；动作忠实度（当前模型未能完全遵循给定动作）。
    - 路线: 交互式智能体与游戏
      解决的问题: 将世界模型落地到交互环境（Atari, Minecraft），用于智能体训练和实时交互，改进视觉细节可提升智能体性能。
      尚未覆盖: 环境规则或目标变化时的泛化能力；实时性能与视觉质量之间的权衡；扩散与自回归架构的选择。
    共识:
    - 世界模型可作为可微分模拟器，用于模型内的规划或策略学习，减少对真实交互的依赖。
    - 动作条件化对于可控生成和下游任务性能至关重要。
    - 生成帧的视觉保真度与交互领域中的智能体性能相关。
    - 标准基准（nuScenes, Atari 100k）被广泛用于评估，支持跨方法比较。
    分歧:
    - 表示方式：离散潜变量（Dreamer） vs. 基于扩散的像素生成（DIAMOND, MaskGWM） vs. 自回归token预测（MineWorld,
      FAR-Drive）。
    - 监督信号：稀疏奖励（DayDreamer） vs. 语言指令（RoboDreamer） vs. 轨迹数据（Terra, FAR-Drive）。
    - 评测目标：智能体性能（DIAMOND） vs. 视频质量和一致性（MaskGWM） vs. 动作忠实度（Terra ACT-Bench）。
    - 交互模式：开环预测 vs. 带反馈的闭环自回归生成。
    - 部署场景：真实物理机器人（DayDreamer） vs. 仅仿真（RoboDreamer, DIAMOND, 驾驶模型）。
    开放问题:
    - 自动驾驶中仿真的改进如何迁移到真实安全性和运营结果？
    - 世界模型能否在不重新训练的情况下泛化到不同的机器人本体、任务和物理环境？
    - 实时交互世界模型中视觉细节与计算效率的最佳权衡是什么？
    - 如何保证驾驶世界模型中的动作忠实度，尤其是在分布偏移条件下？
    - 自回归世界模型能否扩展到更长时域而不退化，并在视觉质量上匹配扩散模型？
