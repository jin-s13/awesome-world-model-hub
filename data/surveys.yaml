  related_work_outline:
  - 'Mainstream direction: World models are shifting from latent-dynamics RL (Dreamer-style)
    to diffusion-based video generation for planning and pretraining, with increasing
    emphasis on scalability and real-world deployment.'
  - 'Shared research pattern: Stochastic latent variables (VAE, diffusion) combined
    with sequence modeling (RNN, Transformer) to predict future observations or latent
    states conditioned on actions.'
  - 'Key differences: Representation space (latent state vs. pixel video), training
    objective (RL loss vs. generation loss), evaluation target (task performance vs.
    video fidelity), and interaction mode (online RL vs. offline pretraining).'
  - 'Trend evolution: From 2018–2022 Dreamer-based online RL on robots (DayDreamer)
    to 2023–2026 Transformer/diffusion models (STORM, MaskGWM, UWM) that scale to
    large datasets and support zero-shot generalization and compositional generation.'
  - 'Open questions: How to guarantee physical consistency in generated videos; how
    to achieve zero-shot generalization to unseen dynamics without observable context;
    how to isolate the world model’s contribution from the planner or task prior.'
  related_work_outline_zh:
  - 主流方向：世界模型正从潜在动力学强化学习（Dreamer风格）转向基于扩散的视频生成用于规划和预训练，越来越强调可扩展性和真实世界部署。
  - 研究共性：随机潜在变量（VAE、扩散）结合序列建模（RNN、Transformer），以预测以动作为条件的未来观测或潜在状态。
  - 关键差异：表示空间（潜在状态 vs. 像素视频）、训练目标（RL损失 vs. 生成损失）、评估目标（任务性能 vs. 视频保真度）以及交互模式（在线RL vs.
    离线预训练）。
  - 趋势演进：从2018–2022年基于Dreamer的在线机器人学习（DayDreamer）到2023–2026年Transformer/扩散模型（STORM、MaskGWM、UWM），扩展到大规模数据集并支持零样本泛化和组合生成。
  - 开放问题：如何保证生成视频的物理一致性；如何在无可观测上下文的情况下实现未见动力学的零样本泛化；如何分离世界模型与规划器或任务先验的贡献。
  literature_review:
    line_of_work_matrix:
    - line: Latent dynamics for model-based RL
      what_it_solves: Learning compact latent representations for planning and policy
        learning from interaction data, enabling sample-efficient online RL on physical
        robots.
      what_remains_open: Generalization to unseen dynamics and partial observability;
        scaling to high-dimensional observations without losing temporal coherence.
    - line: Diffusion-based video world models
      what_it_solves: Generating future video frames conditioned on actions, enabling
        visual planning, pretraining on large datasets, and zero-shot transfer across
        tasks.
      what_remains_open: Physical consistency and long-horizon stability of generated
        videos; action conditioning fidelity when action and video modalities are
        coupled.
    - line: Compositional world models via language decomposition
      what_it_solves: Leveraging language to factorize video generation into primitive-level
        components, enabling compositional generalization to unseen object-action
        combinations.
      what_remains_open: Reliance on predefined primitives and accurate language parsing;
        evaluation limited to simulation without real-robot validation.
    consensus:
    - Stochastic latent variables (VAE or diffusion) improve robustness and sample
      efficiency in world models.
    - Sequence modeling (RNN or Transformer) is essential for capturing temporal dependencies
      in dynamics.
    - Video generation serves as a useful proxy for learning dynamics, especially
      when reward signals are sparse or absent.
    disagreements:
    - 'Representation space: latent state (Dreamer, cRSSM) vs. pixel-level video (MaskGWM,
      UWM) for planning and control.'
    - 'Supervision signal: RL reward and value targets (DayDreamer) vs. self-supervised
      reconstruction or diffusion loss (STORM, RoboScape).'
    - 'Evaluation target: task performance (Atari score, robot success rate) vs. video
      fidelity (FVD, PSNR) and physical plausibility.'
    - 'Interaction mode: online RL with real-world interaction (DayDreamer) vs. offline
      pretraining on static datasets (UWM, RoboDreamer).'
    - 'Deployment setting: simulation-only (RoboDreamer, STORM) vs. real-robot validation
      (DayDreamer, MaskGWM).'
    open_questions:
    - How to guarantee physical consistency in generated videos without explicit physics
      priors or keypoint dynamics?
    - How to achieve zero-shot generalization to unseen dynamics when context variables
      are not observable?
    - How to disentangle the contribution of the world model from the planner, controller,
      or task prior in overall performance gains?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基于模型强化学习的潜在动力学
      解决的问题: 从交互数据中学习紧凑的潜在表示用于规划和策略学习，实现物理机器人的样本高效在线学习。
      尚未覆盖: 对未见动力学和部分可观测性的泛化；扩展到高维观测时保持时间一致性。
    - 路线: 基于扩散的视频世界模型
      解决的问题: 生成以动作为条件的未来视频帧，支持视觉规划、大规模数据集预训练以及跨任务的零样本迁移。
      尚未覆盖: 生成视频的物理一致性和长时域稳定性；动作与视频模态耦合时的动作条件保真度。
    - 路线: 基于语言分解的组合世界模型
      解决的问题: 利用语言将视频生成分解为原语级组件，实现对未见物体-动作组合的组合泛化。
      尚未覆盖: 依赖预定义原语和准确的语言解析；评估仅限于仿真，缺乏真实机器人验证。
    共识:
    - 随机潜在变量（VAE或扩散）提高了世界模型的鲁棒性和样本效率。
    - 序列建模（RNN或Transformer）对于捕捉动力学中的时间依赖至关重要。
    - 视频生成作为学习动力学的有用代理，尤其在奖励信号稀疏或缺失时。
    分歧:
    - 表示空间：用于规划和控制的潜在状态（Dreamer、cRSSM）与像素级视频（MaskGWM、UWM）。
    - 监督信号：RL奖励和价值目标（DayDreamer）与自监督重建或扩散损失（STORM、RoboScape）。
    - 评估目标：任务性能（Atari分数、机器人成功率）与视频保真度（FVD、PSNR）及物理合理性。
    - 交互模式：在线RL与真实世界交互（DayDreamer）与离线预训练静态数据集（UWM、RoboDreamer）。
    - 部署场景：仅仿真（RoboDreamer、STORM）与真实机器人验证（DayDreamer、MaskGWM）。
    开放问题:
    - 如何在没有显式物理先验或关键点动力学的情况下保证生成视频的物理一致性？
    - 当上下文变量不可观测时，如何实现对未见动力学的零样本泛化？
    - 如何分离世界模型与规划器、控制器或任务先验在整体性能提升中的贡献？
