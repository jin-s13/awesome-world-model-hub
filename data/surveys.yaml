    - 这个主题的主体由自动驾驶与仿真应用、具身与领域任务迁移、交互式智能体与游戏构成，共同目标是把世界模型适配到受任务约束、本体和运行环境影响的领域任务。
    - 常见范式是把预测绑定到领域特定的状态/动作空间，并在真实变化下评测任务成功，而不是把论文标题或标签当作比较单位。
    分歧:
    - 论文之间的实质分歧集中在机器人、驾驶、交互式智能体等具有不同动作空间和证据标准的领域；这些选择决定输入输出约定、证据标准和失败模式。
    - 尚未解决的边界包括仿真收益与真实安全或运营结果之间是否一致；另一个反复出现的问题是改进能否跨本体、数据集、机构或物理环境迁移。
    开放问题:
    - 当下游任务、控制器或数据分布变化时，哪些表示选择仍然有效？
    - 什么样的共享基准能同时比较预测质量、可控性和决策效用？
