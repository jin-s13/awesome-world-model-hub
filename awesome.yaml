# =============================================================================
# awesome-hub-generator 配置文件
# 实例: Awesome World Model Hub
# =============================================================================

project:
  name: "Awesome World Model Hub"
  description: "A curated hub for World Model papers, benchmarks, datasets, and research."
  github_url: "https://github.com/jin-s13/awesome-world-model-hub"
  site_url: "https://jin-s13.github.io/awesome-world-model-hub"
  generator_repo: "jin-s13/awesome-hub-generator"

research:
  # === 搜索关键词 ===
  keywords:
    - "world model"
    - "world simulator"
    - "generative world model"
    - "interactive world model"
    - "video world model"
    - "world dynamics prediction"
    - "model-based reinforcement learning world model"

  # === 论文分类体系 ===
  taxonomy:
    paper_types:
      - label: "method"
        description: "New world model architectures, training objectives, inference methods, or planning/control algorithms."
      - label: "benchmark"
        description: "Datasets, evaluation suites, metrics, stress tests, leaderboards, or benchmark studies."
      - label: "system"
        description: "Runnable systems, platforms, simulators, frameworks, toolkits, or deployed pipelines."
      - label: "theory"
        description: "Theoretical analysis, formalization, guarantees, scaling laws, or conceptual foundations."
      - label: "survey"
        description: "Surveys, taxonomies, tutorials, position papers, or roadmap papers."
      - label: "application"
        description: "Domain applications of world models, such as robotics, driving, games, healthcare, or scientific simulation."
    dimensions:
      - name: "techniques"
        description: "key techniques or methods used"
      - name: "domains"
        description: "application domains or environments"
      - name: "modalities"
        description: "input/output modalities such as video, action, 3D, language, proprioception, or tactile signals"

  # === 相关性判断标准 ===
  relevance_criteria:
    include:
      - "world models for prediction, simulation, planning, control, or decision making"
      - "video, 3D, embodied, robotic, driving, game, or interactive generative world models"
      - "model-based reinforcement learning or latent dynamics models used as world models"
      - "datasets, benchmarks, or evaluations specifically targeting world models"
      - "theoretical or survey work centered on world models"
    exclude:
      - "generic generative AI without world-modeling, simulation, or predictive dynamics"
      - "ordinary LLM agents, MCP tools, coding agents, RAG, or software engineering without a world model contribution"
      - "medical, finance, climate, anomaly detection, or time-series papers unrelated to world models"
      - "general computer vision or 3D reconstruction without dynamics, simulation, or world-model framing"

  # === 负向关键词（命中直接排除） ===
  negative_keywords:
    # 医学
    - "medical imaging"
    - "protein folding"
    - "drug discovery"
    - "cancer detection"
    - "tumor"
    - "radiology"
    - "clinical diagnosis"
    - "dental"
    - "ECG"
    - "EEG"
    # 金融
    - "stock market"
    - "trading"
    - "cryptocurr"
    # 其他不相关
    - "weather forecast"
    - "climate change"
    - "anomaly detection"

  # === 领域加分词 ===
  domain_boost_keywords:
    - "world model"
    - "world simulator"
    - "generative simulator"
    - "environment model"
    - "dynamics model"
    - "model-based RL"
    - "dreamer"
    - "imagination"
    - "video generation"
    - "game engine"

  # === arXiv 分类过滤 ===
  arxiv_categories:
    - "cs.CV"
    - "cs.LG"
    - "cs.AI"
    - "cs.RO"

  # === 全量构建的起始日期 ===
  date_from: "2022-01-01"

  # === 每日搜索的天数范围 ===
  daily_search_days: 3

  # === 数据源开关 ===
  sources:
    arxiv: true
    huggingface_daily: true
    huggingface_trending: true
    huggingface_datasets: true
    upstream_awesome: true
    alphaxiv: false

  # === 上游 awesome 项目 ===
  upstream_awesome:
    repos:
      - "LMD0311/Awesome-World-Model"
    auto_discover: false

  # === 评分配置 ===
  scoring:
    base_score: 1.5
    weight_coefficient: 2.5
    max_score_per_keyword: 10
    author_bonus:
      enabled: false
      bonus_points: 5.0
      expert_authors: []

  # === Read-first 排序配置 ===
  ranking:
    enabled: true
    weights:
      topical_relevance: 0.25
      citation_impact: 0.15
      graph_prestige: 0.15
      citation_velocity: 0.10
      methodology_quality: 0.15
      reproducibility: 0.15
      recency: 0.05
    citation_graph:
      enabled: true
      fetch_openalex: true
      timeout: 20
      workers: 10

  # === 深度分析配置 ===
  deep_analysis:
    enabled: true
    min_score: 30
    pdf_parser: "mineru"
    max_papers_per_run: 10

  # === 关键词趋势追踪 ===
  keyword_tracking:
    enabled: true
    report_frequency: "weekly"

website:
  sections:
    papers: true
    surveys: true
    datasets: true
    tools: false
    resources: false
    trends: true
  nav:
    - home
    - papers
    - trends
    - datasets
  features:
    filter_bar: true
    i18n: true
    teaser_images: true
    search: true
